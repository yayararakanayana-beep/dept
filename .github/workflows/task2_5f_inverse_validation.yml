name: Task2-5f Inverse Validation

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_4.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_5a.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_5b.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_5c.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_5d.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_5e.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_5f.py'
      - 'docs/action_module_upper_pressure_reception_split_task2_5_validation_design.md'
      - '.github/workflows/task2_5f_inverse_validation.yml'

jobs:
  task2-5f-inverse-validation:
    name: Task2-5f inverse validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-5f tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          pytest -q \
            tests/test_action_module_upper_pressure_reception_split_task2_4.py \
            tests/test_action_module_upper_pressure_reception_split_task2_5a.py \
            tests/test_action_module_upper_pressure_reception_split_task2_5b.py \
            tests/test_action_module_upper_pressure_reception_split_task2_5c.py \
            tests/test_action_module_upper_pressure_reception_split_task2_5d.py \
            tests/test_action_module_upper_pressure_reception_split_task2_5e.py \
            tests/test_action_module_upper_pressure_reception_split_task2_5f.py

      - name: Export Task2-5f inverse validation table
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_5f_inverse_validation import (
              build_and_validate_inverse_pressure_action_validation_table,
          )

          def markdown_table(df, columns, limit=40):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              if view.empty:
                  return '_No displayable columns._'
              headers = list(view.columns)
              lines = []
              lines.append('| ' + ' | '.join(headers) + ' |')
              lines.append('| ' + ' | '.join(['---'] * len(headers)) + ' |')
              for _, row in view.iterrows():
                  values = []
                  for h in headers:
                      value = row[h]
                      if isinstance(value, float):
                          values.append(f'{value:.6g}')
                      else:
                          values.append(str(value).replace('|', '/'))
                  lines.append('| ' + ' | '.join(values) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_5f_inverse_validation_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors = build_and_validate_inverse_pressure_action_validation_table()
          table.to_csv(out_dir / 'inverse_pressure_action_validation.csv', index=False)

          caution = table[table['requires_task2_6_converter_caution'].astype(bool)].copy() if not table.empty else pd.DataFrame()
          caution.to_csv(out_dir / 'converter_caution_rows.csv', index=False)

          summary_by_mix = (
              table.groupby(['pressure_input_id', 'pressure_mix_ja'], dropna=False)
              .agg(
                  rows=('pressure_input_id', 'count'),
                  mean_alignment=('intent_alignment_score', 'mean'),
                  max_divergence=('divergence_risk', 'max'),
                  max_side_effect=('side_effect_burden', 'max'),
                  rollback_rows=('rollback_required', lambda s: int(s.astype(bool).sum())),
                  caution_rows=('requires_task2_6_converter_caution', lambda s: int(s.astype(bool).sum())),
              )
              .reset_index()
              if not table.empty else pd.DataFrame()
          )
          summary_by_mix.to_csv(out_dir / 'summary_by_pressure_mix.csv', index=False)

          summary = {
              'validation_errors': errors,
              'rows': int(len(table)),
              'pressure_inputs': int(table['pressure_input_id'].nunique()) if not table.empty else 0,
              'state_bands': sorted(table['scenario_or_state_band'].astype(str).unique().tolist()) if not table.empty else [],
              'mean_intent_alignment': float(table['intent_alignment_score'].mean()) if not table.empty else 0.0,
              'max_divergence_risk': float(table['divergence_risk'].max()) if not table.empty else 0.0,
              'rollback_required_rows': int(table['rollback_required'].astype(bool).sum()) if not table.empty else 0,
              'converter_caution_rows': int(table['requires_task2_6_converter_caution'].astype(bool).sum()) if not table.empty else 0,
              'runtime_policy_input': bool(table['runtime_policy_input'].astype(bool).any()) if not table.empty else False,
              'converter_created': bool(table['pressure_to_action_converter_created'].astype(bool).any()) if not table.empty else False,
          }
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-5f Inverse Pressure-Action Validation RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Inverse validation table generated with no structural validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Summary by pressure mix')
          md.append('')
          md.append(markdown_table(summary_by_mix, ['pressure_mix_ja', 'mean_alignment', 'max_divergence', 'max_side_effect', 'rollback_rows', 'caution_rows'], limit=20))
          md.append('')
          md.append('## Converter caution rows')
          md.append('')
          cols = [
              'pressure_mix_ja', 'state_band_ja', 'applied_action_set_ja',
              'intent_alignment_score', 'side_effect_burden', 'recoverability_score',
              'divergence_risk', 'rollback_required', 'inverse_validation_status',
              'recommended_post_filtering',
          ]
          md.append(markdown_table(caution.sort_values(['divergence_risk', 'side_effect_burden'], ascending=False), cols, limit=40))
          md.append('')
          (out_dir / 'TASK2_5F_INVERSE_PRESSURE_ACTION_VALIDATION_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:180]))
          if errors:
              raise SystemExit('Task2-5f table contained structural errors')
          PY

      - name: Upload Task2-5f artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-5f-inverse-pressure-action-validation-rc1
          path: results/task2_5f_inverse_validation_rc1/
          if-no-files-found: error

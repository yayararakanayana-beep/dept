name: Task2-8j-26 FullSpec Integration Bridge

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/contracts/cycle_state.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/runner/fullspec_integrated_closed_loop_runner.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/task2_8j_fullspec_integration_bridge.py'
      - 'tests/test_fullspec_task2_8j_26_integration_bridge.py'
      - '.github/workflows/task2_8j_26_fullspec_integration_bridge.yml'
      - 'docs/task2_8j_26_fullspec_integration_bridge.md'

jobs:
  task2-8j-26-fullspec-integration-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run FullSpec Task2-8j integration bridge test
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_fullspec_task2_8j_26_integration_bridge.py

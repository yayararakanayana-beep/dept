name: Task2-8j-19 V2 Terrain Action Sandbox Design

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_19_v2_terrain_action_sandbox_design.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_19.py'
      - '.github/workflows/task2_8j_19_v2_terrain_action_sandbox_design.yml'

jobs:
  task2-8j-19:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_19.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_19_v2_terrain_action_sandbox_design import build_and_validate_v2_terrain_action_sandbox_design
          out = Path('results/task2_8j_19_v2_terrain_action_sandbox_design_rc1')
          out.mkdir(parents=True, exist_ok=True)
          operator_families, signals, sweep, guards, checks, final_summary, errors, summary = build_and_validate_v2_terrain_action_sandbox_design()
          operator_families.to_csv(out / 'terrain_operator_families.csv', index=False)
          signals.to_csv(out / 'terrain_signal_contract.csv', index=False)
          sweep.to_csv(out / 'terrain_action_parameter_sweep_design.csv', index=False)
          guards.to_csv(out / 'terrain_action_sandbox_guards.csv', index=False)
          checks.to_csv(out / 'terrain_action_sandbox_design_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_19_V2_TERRAIN_ACTION_SANDBOX_DESIGN_RC1.md').write_text('# Task 2-8j-19\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-19 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-19-v2-terrain-action-sandbox-design-rc1
          path: results/task2_8j_19_v2_terrain_action_sandbox_design_rc1/
          if-no-files-found: error

name: Task2-8j-20b Macro Game Risk Simulator Contract

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_20b_macro_game_risk_simulator_contract.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_20b.py'
      - '.github/workflows/task2_8j_20b_macro_game_risk_simulator_contract.yml'

jobs:
  task2-8j-20b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_20b.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_20b_macro_game_risk_simulator_contract import build_and_validate_macro_game_risk_simulator_contract
          out = Path('results/task2_8j_20b_macro_game_risk_simulator_contract_rc1')
          out.mkdir(parents=True, exist_ok=True)
          gate, inputs, outputs, functions, checks, final_summary, errors, summary = build_and_validate_macro_game_risk_simulator_contract()
          gate.to_csv(out / 'observation_gate_contract.csv', index=False)
          inputs.to_csv(out / 'macro_game_input_contract.csv', index=False)
          outputs.to_csv(out / 'simulator_output_contract.csv', index=False)
          functions.to_csv(out / 'actionmodule_function_contract.csv', index=False)
          checks.to_csv(out / 'macro_game_risk_simulator_contract_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_20B_MACRO_GAME_RISK_SIMULATOR_CONTRACT_RC1.md').write_text('# Task 2-8j-20b\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-20b validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-20b-macro-game-risk-simulator-contract-rc1
          path: results/task2_8j_20b_macro_game_risk_simulator_contract_rc1/
          if-no-files-found: error

name: Relation Field Prediction State P1

on:
  push:
    paths:
      - 'configs/relation_field_prediction_state_p1_*.json'
      - 'scripts/relation_field_prediction_state_p1.py'
      - 'tests/test_relation_field_prediction_state_p1.py'
      - 'docs/relation_field_prediction/P1_CAUSAL_PREDICTION_STATE.md'
      - '.github/workflows/relation-field-prediction-state-p1.yml'
      - 'scripts/generic_relation_field_g2.py'
      - 'scripts/generic_relation_field_g3.py'
      - 'scripts/relation_field_*.py'
      - 'configs/generic_relation_field_*.json'
      - 'configs/relation_field_*.json'
  pull_request:
    paths:
      - 'configs/relation_field_prediction_state_p1_*.json'
      - 'scripts/relation_field_prediction_state_p1.py'
      - 'tests/test_relation_field_prediction_state_p1.py'
      - 'docs/relation_field_prediction/P1_CAUSAL_PREDICTION_STATE.md'
      - '.github/workflows/relation-field-prediction-state-p1.yml'
      - 'scripts/generic_relation_field_g2.py'
      - 'scripts/generic_relation_field_g3.py'
      - 'scripts/relation_field_*.py'
      - 'configs/generic_relation_field_*.json'
      - 'configs/relation_field_*.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-p1:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip numpy scipy pytest

      - name: Parse contracts and compile modules
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in sorted(Path('configs').glob('relation_field_prediction_state_p1_*.json')):
              json.loads(path.read_text(encoding='utf-8'))
              print(f'valid json: {path}')
          PY
          python -m py_compile \
            scripts/relation_field_prediction_state_p1.py \
            tests/test_relation_field_prediction_state_p1.py

      - name: Run P1 builder, validator, and negative tests
        run: PYTHONPATH=scripts python -m pytest -q tests/test_relation_field_prediction_state_p1.py

      - name: Run inherited G2 and G3 regression tests
        run: PYTHONPATH=scripts python -m pytest -q tests/test_generic_relation_field_g2.py tests/test_generic_relation_field_g3.py

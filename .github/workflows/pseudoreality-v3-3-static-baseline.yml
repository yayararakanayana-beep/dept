name: PseudoReality v3.3 Static Baseline

on:
  pull_request:
    paths:
      - "pseudo_reality/**"
      - "scripts/pseudoreality_v3_3_static_7d_raw_baseline.py"
      - "tests/test_pseudoreality_v3_3_static_7d_raw_baseline.py"
      - ".github/workflows/pseudoreality-v3-3-static-baseline.yml"
  push:
    branches:
      - main
    paths:
      - "pseudo_reality/**"
      - "scripts/pseudoreality_v3_3_static_7d_raw_baseline.py"
      - "tests/test_pseudoreality_v3_3_static_7d_raw_baseline.py"
      - ".github/workflows/pseudoreality-v3-3-static-baseline.yml"
  workflow_dispatch:

concurrency:
  group: pseudoreality-v3-3-static-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-7d-baseline:
    name: Static 7D raw baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Compile static baseline script
        run: |
          python -m py_compile pseudo_reality/distribution_terrain_v3.py
          python -m py_compile pseudo_reality/distribution_terrain_v3_2.py
          python -m py_compile pseudo_reality/distribution_terrain_v3_2_2.py
          python -m py_compile scripts/pseudoreality_v3_3_static_7d_raw_baseline.py

      - name: Run static baseline tests
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/v3-3-static-7d-raw-baseline
          set -o pipefail
          PYTHONPATH=. pytest tests/test_pseudoreality_v3_3_static_7d_raw_baseline.py -q 2>&1 | tee outputs/pseudoreality-v3-validation/v3-3-static-7d-raw-baseline/pytest.log

      - name: Export static 7D baseline
        run: PYTHONPATH=. python scripts/pseudoreality_v3_3_static_7d_raw_baseline.py

      - name: Upload static baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pseudoreality-v3-3-static-7d-raw-baseline
          path: outputs/pseudoreality-v3-validation/v3-3-static-7d-raw-baseline/
          if-no-files-found: warn

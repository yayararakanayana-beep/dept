name: Task2-8j-8 Action Module Input Split Contract

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_8_action_module_input_split_contract.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_8.py'
      - '.github/workflows/task2_8j_8_action_module_input_split_contract.yml'

jobs:
  task2-8j-8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_8.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_8_action_module_input_split_contract import build_and_validate_action_module_input_split_contract
          out = Path('results/task2_8j_8_action_module_input_split_contract_rc1')
          out.mkdir(parents=True, exist_ok=True)
          route_contract, port_contract, separation_rules, readiness, final_summary, errors, summary = build_and_validate_action_module_input_split_contract()
          route_contract.to_csv(out / 'action_module_route_contract.csv', index=False)
          port_contract.to_csv(out / 'action_module_port_contract.csv', index=False)
          separation_rules.to_csv(out / 'route_separation_rules.csv', index=False)
          readiness.to_csv(out / 'input_split_readiness.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_8_ACTION_MODULE_INPUT_SPLIT_CONTRACT_RC1.md').write_text('# Task 2-8j-8\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-8 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-8-action-module-input-split-contract-rc1
          path: results/task2_8j_8_action_module_input_split_contract_rc1/
          if-no-files-found: error

name: DEPT Prediction Module

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/dept_prediction_activation_module.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/dept_prediction_module.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/validation/dept_prediction_validation_suite.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/validation/dept_prediction_v2_validation_bench.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/contracts/cycle_state.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/runner/fullspec_integrated_closed_loop_runner.py'
      - 'scripts/run_dept_prediction_v2_validation_bench.py'
      - 'tests/test_dept_prediction_module.py'
      - 'tests/test_dept_prediction_validation_suite.py'
      - 'tests/test_dept_prediction_v2_validation_bench.py'
      - '.github/workflows/dept_prediction_module.yml'

jobs:
  dept-prediction-module:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest tabulate
      - name: Run prediction module unit tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          pytest -q --tb=short --disable-warnings tests/test_dept_prediction_module.py
      - name: Run prediction validation suite tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          pytest -q --tb=short --disable-warnings tests/test_dept_prediction_validation_suite.py
      - name: Run v2 prediction validation bench tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          pytest -q --tb=short --disable-warnings tests/test_dept_prediction_v2_validation_bench.py
      - name: Generate v2 heldout validation report
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python scripts/run_dept_prediction_v2_validation_bench.py --out-dir artifacts/dept_prediction_v2_validation
      - name: Upload v2 prediction validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dept-prediction-v2-validation
          path: artifacts/dept_prediction_v2_validation

name: Task 3.2-3 Rev1 Phase 1 Contract

on:
  pull_request:
    paths:
      - 'configs/task3_2_3_rev1_contract.json'
      - 'scripts/task3_2_3_rev1_contract.py'
      - 'tests/test_task3_2_3_rev1_contract.py'
      - 'docs/task3_2_macro_dynamics_exploration/TASK3_2_3_REV1_PHASE1_CONTRACT.md'
      - '.github/workflows/task3-2-3-rev1-phase1-contract.yml'
      - 'AGENTS.md'
  workflow_dispatch:

jobs:
  contract-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install pytest
      - name: Compile contract validator
        run: python -m py_compile scripts/task3_2_3_rev1_contract.py
      - name: Validate frozen Phase 1 contract
        run: python scripts/task3_2_3_rev1_contract.py
      - name: Run positive and negative contract tests
        run: python -m pytest -vv tests/test_task3_2_3_rev1_contract.py

name: PseudoReality v3.3 Task 3.1e Static Full Distribution Testbed
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'scripts/pseudoreality_v3_3_static_full_distribution_*.py'
      - 'scripts/task3_1e_static_full_distribution/**'
      - 'configs/task3_1e_static_full_distribution_testbed.json'
      - 'tests/test_pseudoreality_v3_3_static_full_distribution_*.py'
      - '.github/workflows/pseudoreality-v3-3-static-full-distribution-testbed.yml'
      - 'docs/task3_1e_static_full_distribution_testbed/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Task 3.1e profile to run'
        required: true
        default: formal
        type: choice
        options: [smoke, formal]
concurrency:
  group: task3-1e-${{ github.event.pull_request.number || github.ref }}-${{ inputs.profile || 'pr' }}
  cancel-in-progress: true
jobs:
  smoke:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.profile == 'smoke')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m pip install --upgrade pip numpy pandas scipy pytest tabulate
      - run: python -m pytest tests/test_pseudoreality_v3_3_static_full_distribution_testbed.py tests/test_pseudoreality_v3_3_static_full_distribution_negative.py -q
      - run: python scripts/pseudoreality_v3_3_static_full_distribution_testbed.py --profile smoke --output-root artifacts
      - run: python scripts/pseudoreality_v3_3_static_full_distribution_coverage_audit.py --profile smoke --artifact-root artifacts
      - run: python scripts/pseudoreality_v3_3_static_full_distribution_validator.py --profile smoke --artifact-root artifacts --strict
  formal:
    if: (github.event_name == 'workflow_dispatch' && inputs.profile == 'formal') || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-task3-1e-formal'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m pip install --upgrade pip numpy pandas scipy pytest tabulate
      - run: python -m pytest tests/test_pseudoreality_v3_3_static_full_distribution_testbed.py tests/test_pseudoreality_v3_3_static_full_distribution_negative.py -q
      - run: python scripts/pseudoreality_v3_3_static_full_distribution_testbed.py --profile formal --output-root artifacts
      - run: python scripts/pseudoreality_v3_3_static_full_distribution_coverage_audit.py --profile formal --artifact-root artifacts
      - run: python scripts/pseudoreality_v3_3_static_full_distribution_validator.py --profile formal --artifact-root artifacts --strict
      - uses: actions/upload-artifact@v4
        with:
          name: pseudoreality-v3-3-task3-1e-static-full-distribution
          path: artifacts/pseudoreality_v3_3_task3_1e_static_full_distribution
          retention-days: 14

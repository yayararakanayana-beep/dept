name: Task2-8j-3 Effective Dimension Evaluation

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_1_candidate_feature_log.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_2_temporal_pca_validation.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_3_effective_dimension_evaluation.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_1.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_2.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_3.py'
      - '.github/workflows/task2_8j_3_effective_dimension_evaluation.yml'

jobs:
  task2-8j-3-effective-dimension-evaluation:
    name: Task2-8j-3 effective dimension evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8j-3 tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          pytest -q \
            tests/test_action_module_upper_pressure_reception_split_task2_8j_1.py \
            tests/test_action_module_upper_pressure_reception_split_task2_8j_2.py \
            tests/test_action_module_upper_pressure_reception_split_task2_8j_3.py

      - name: Export Task2-8j-3 effective dimension evaluation tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_1_candidate_feature_log import CandidateFeatureLogConfig
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_2_temporal_pca_validation import TemporalPCAValidationConfig
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_3_effective_dimension_evaluation import (
              EffectiveDimensionEvaluationConfig,
              build_and_validate_effective_dimension_evaluation,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8j_3_effective_dimension_evaluation_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          feature_cfg = CandidateFeatureLogConfig(steps=24, seeds=(501, 502, 503), window_sizes=(1, 6, 12))
          pca_cfg = TemporalPCAValidationConfig(n_components=6, sparse_top_k=12, prediction_horizon=3)
          eval_cfg = EffectiveDimensionEvaluationConfig()
          evaluation_table, component_count_table, overlap_table, final_summary, errors, summary = build_and_validate_effective_dimension_evaluation(feature_cfg, pca_cfg, eval_cfg)

          evaluation_table.to_csv(out_dir / 'effective_dimension_evaluation.csv', index=False)
          component_count_table.to_csv(out_dir / 'component_count_candidate_table.csv', index=False)
          overlap_table.to_csv(out_dir / 'component_feature_overlap.csv', index=False)
          final_summary.to_csv(out_dir / 'final_summary.csv', index=False)
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-8j-3 Effective Dimension Evaluation RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Effective-dimension evaluation completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Evaluation table')
          md.append('')
          md.append(markdown_table(
              evaluation_table,
              ['mode', 'candidate_status', 'overall_evaluation_score', 'usefulness_score', 'information_retention_score', 'prediction_usefulness_score', 'stability_score', 'nonredundancy_score', 'usability_score', 'candidate_reason'],
              limit=20,
          ))
          md.append('')
          md.append('## Component count candidates')
          md.append('')
          md.append(markdown_table(
              component_count_table,
              ['mode', 'component_count', 'cumulative_explained_variance_ratio', 'marginal_explained_variance_ratio', 'diminishing_return_flag', 'candidate_component_count', 'component_count_reason'],
              limit=60,
          ))
          md.append('')
          md.append('## Feature-overlap summary')
          md.append('')
          md.append(markdown_table(
              overlap_table,
              ['mode', 'component_i', 'component_j', 'top_feature_overlap_jaccard', 'overlap_feature_count', 'component_pair_status'],
              limit=60,
          ))
          md.append('')
          md.append('## Final summary')
          md.append('')
          md.append(markdown_table(final_summary, list(final_summary.columns), limit=5))

          (out_dir / 'TASK2_8J_3_EFFECTIVE_DIMENSION_EVALUATION_RC1.md').write_text('\n'.join(md), encoding='utf-8')
          print('\n'.join(md[:420]))
          if errors:
              raise SystemExit('Task2-8j-3 validation errors')
          PY

      - name: Upload Task2-8j-3 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8j-3-effective-dimension-evaluation-rc1
          path: results/task2_8j_3_effective_dimension_evaluation_rc1/
          if-no-files-found: error

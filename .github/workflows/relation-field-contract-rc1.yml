name: Relation field contract RC1

on:
  pull_request:
    paths:
      - "configs/relation_field_rc1_contract.json"
      - "configs/fixed5axis_gk_rc1_contract.json"
      - "docs/relation_field_rc1/**"
      - "tests/test_relation_field_rc1_contract.py"
      - ".github/workflows/relation-field-contract-rc1.yml"
  workflow_dispatch:

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest
      - name: Run contract tests
        id: contract_tests
        continue-on-error: true
        run: python -m pytest -vv --tb=short tests/test_relation_field_rc1_contract.py > relation-field-contract-test.log 2>&1
      - name: Print contract test log
        if: always()
        run: cat relation-field-contract-test.log
      - name: Upload contract test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relation-field-contract-test-log
          path: relation-field-contract-test.log
          retention-days: 7
      - name: Preserve test result
        if: steps.contract_tests.outcome == 'failure'
        run: exit 1

name: Task2-8j-6 Macro Game Relation Field

on:
  workflow_dispatch:

jobs:
  task2-8j-6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_6.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_1_candidate_feature_log import CandidateFeatureLogConfig
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_6_macro_game_relation_field_validation import MacroGameRelationFieldConfig, build_and_validate_macro_game_relation_field
          out = Path('results/task2_8j_6_macro_game_relation_field_rc1')
          out.mkdir(parents=True, exist_ok=True)
          feature_cfg = CandidateFeatureLogConfig(steps=24, seeds=(501, 502, 503), window_sizes=(1, 6, 12))
          signal_table, state_table, relation_field, final_summary, errors, summary = build_and_validate_macro_game_relation_field(feature_cfg, MacroGameRelationFieldConfig())
          signal_table.to_csv(out / 'macro_signal_extraction.csv', index=False)
          state_table.to_csv(out / 'gt_macro_signal_state.csv', index=False)
          relation_field.to_csv(out / 'macro_game_relation_field.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_6_MACRO_GAME_RELATION_FIELD_RC1.md').write_text('# Task 2-8j-6\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-6 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-6-macro-game-relation-field-rc1
          path: results/task2_8j_6_macro_game_relation_field_rc1/
          if-no-files-found: error

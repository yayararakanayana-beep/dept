name: Relation Field Prediction P3-3 Predictor

on:
  pull_request:
    paths:
      - "configs/relation_field_prediction_p3_prototype.json"
      - "scripts/relation_field_prediction_p3_connection_check.py"
      - "scripts/relation_field_prediction_p3_flow_translation.py"
      - "scripts/relation_field_prediction_p3_micro_predictor.py"
      - "tests/test_relation_field_prediction_p3_connection_check.py"
      - "tests/test_relation_field_prediction_p3_flow_translation.py"
      - "tests/test_relation_field_prediction_p3_micro_predictor.py"
      - "docs/relation_field_prediction/P3_3_MICRO_PREDICTOR.md"
      - ".github/workflows/relation-field-prediction-p3-3-predictor.yml"
  workflow_dispatch:

jobs:
  predictor-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest
      - name: Compile P3 prototype modules
        run: >-
          python -m py_compile
          scripts/relation_field_prediction_p3_connection_check.py
          scripts/relation_field_prediction_p3_flow_translation.py
          scripts/relation_field_prediction_p3_micro_predictor.py
      - name: Run P3 prototype tests
        run: >-
          python -m pytest --noconftest -q
          tests/test_relation_field_prediction_p3_connection_check.py
          tests/test_relation_field_prediction_p3_flow_translation.py
          tests/test_relation_field_prediction_p3_micro_predictor.py

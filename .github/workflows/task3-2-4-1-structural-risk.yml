name: Task 3.2-4.1 Structural Risk

on:
  pull_request:
    paths:
      - 'configs/task3_2_*.json'
      - 'scripts/task3_2_*.py'
      - 'tests/test_task3_2_*.py'
      - 'pseudo_reality/distribution_terrain_v3*.py'
      - 'docs/task3_2_macro_dynamics_exploration/**'
      - '.github/workflows/task3-2-4-1-structural-risk.yml'
      - 'AGENTS.md'
  workflow_dispatch:

jobs:
  formal-structural-risk:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install repository dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest
      - name: Compile Task 3.2 modules
        run: |
          python -m py_compile scripts/task3_2_1_macro_dynamics_contract.py
          python -m py_compile scripts/task3_2_2_continuous_trajectory.py
          python -m py_compile scripts/task3_2_2_reference_calibration.py
          python -m py_compile scripts/_task3_2_3_core.py
          python -m py_compile scripts/task3_2_3_simple_early_warning.py
          python -m py_compile scripts/task3_2_4_challenge_corpus.py
          python -m py_compile scripts/task3_2_4_challenge_runner.py
          python -m py_compile scripts/task3_2_4_macro_dynamics.py
          python -m py_compile scripts/task3_2_4_result_runner.py
          python -m py_compile scripts/task3_2_4_1_structural_risk.py
      - name: Run targeted Task 3.2 tests
        run: |
          set -o pipefail
          python -m pytest -vv \
            tests/test_task3_2_1_macro_dynamics_contract.py \
            tests/test_task3_2_2_continuous_trajectory.py \
            tests/test_task3_2_2_reference_calibration.py \
            tests/test_task3_2_3_simple_early_warning.py \
            tests/test_task3_2_3_judgement.py \
            tests/test_task3_2_4_challenge_corpus.py \
            tests/test_task3_2_4_macro_dynamics.py \
            tests/test_task3_2_4_judgement.py \
            tests/test_task3_2_4_1_structural_risk.py \
            2>&1 | tee task3_2_4_1_pytest.log
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-2-4-1-pytest-diagnostics
          path: task3_2_4_1_pytest.log
          retention-days: 7
      - name: Generate Task 4.1 challenge corpus
        run: |
          python scripts/task3_2_4_challenge_runner.py generate \
            --config configs/task3_2_4_1_structural_risk.json \
            --output work/task4_1_corpus
      - name: Calibrate Task 4.1 corpus
        run: python scripts/task3_2_2_reference_calibration.py --input work/task4_1_corpus
      - name: Validate persisted Task 4.1 corpus
        run: |
          python scripts/task3_2_4_challenge_runner.py validate \
            --config configs/task3_2_4_1_structural_risk.json \
            --input work/task4_1_corpus
      - name: Run Task 4.1 counterfactual branches and predictors
        run: |
          python scripts/task3_2_4_1_structural_risk.py run \
            --corpus work/task4_1_corpus \
            --output artifacts/task3_2_4_1_formal
      - name: Validate persisted Task 4.1 artifact
        run: python scripts/task3_2_4_1_structural_risk.py validate --input artifacts/task3_2_4_1_formal
      - name: Upload formal Task 4.1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: task3-2-4-1-structural-risk-formal
          path: artifacts/task3_2_4_1_formal
          retention-days: 30

name: Task2-8e Arbitrary Risk Dynamics Sandbox

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8e.py'
      - '.github/workflows/task2_8e_arbitrary_risk_dynamics_sandbox.yml'

jobs:
  task2-8e-arbitrary-risk-dynamics-sandbox:
    name: Task2-8e arbitrary risk dynamics sandbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8e tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8e.py

      - name: Export Task2-8e arbitrary risk dynamics sandbox tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8e_arbitrary_risk_dynamics_sandbox import (
              build_and_validate_arbitrary_risk_dynamics_sandbox_table,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8e_arbitrary_risk_dynamics_sandbox_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors, summary = build_and_validate_arbitrary_risk_dynamics_sandbox_table()
          table.to_csv(out_dir / 'arbitrary_risk_dynamics_sandbox.csv', index=False)

          positive = table[table['positive_net_vs_no_op'].astype(bool)].sort_values('long_term_net_benefit', ascending=False)
          positive.to_csv(out_dir / 'positive_conditions_vs_no_op.csv', index=False)

          by_strategy = table.groupby('strategy').agg(
              rows=('strategy', 'size'),
              positive_rows=('positive_net_vs_no_op', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_auc_delta=('risk_auc_delta_vs_no_op', 'mean'),
              mean_post_delta=('post_action_auc_delta_vs_no_op', 'mean'),
              mean_peak_delta=('risk_peak_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
              mean_terrain_persistence=('terrain_persistence_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_strategy.to_csv(out_dir / 'strategy_summary.csv', index=False)

          by_dynamics_action = table[table['strategy'].astype(str) != 'no_op'].groupby(['risk_dynamics_type', 'strategy', 'terrain_action', 'strength_band', 'duration_band', 'timing_band']).agg(
              rows=('strategy', 'size'),
              positive_rows=('positive_net_vs_no_op', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_auc_delta=('risk_auc_delta_vs_no_op', 'mean'),
              mean_post_delta=('post_action_auc_delta_vs_no_op', 'mean'),
              mean_peak_delta=('risk_peak_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
              mean_terrain_persistence=('terrain_persistence_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_dynamics_action.to_csv(out_dir / 'condition_summary.csv', index=False)

          summary = dict(summary)
          summary['validation_errors'] = errors
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-8e Arbitrary Risk Dynamics Sandbox RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Arbitrary risk dynamics sandbox completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Strategy summary')
          md.append('')
          md.append(markdown_table(by_strategy, list(by_strategy.columns), limit=20))
          md.append('')
          md.append('## Top positive conditions vs no_op')
          md.append('')
          md.append(markdown_table(
              positive,
              [
                  'risk_dynamics_type', 'risk_dynamics_ja', 'strategy', 'terrain_action_ja',
                  'strength_band', 'duration_band', 'timing_band', 'long_term_net_benefit',
                  'risk_peak_delta_vs_no_op', 'risk_auc_delta_vs_no_op',
                  'post_action_auc_delta_vs_no_op', 'gain_auc_delta_vs_no_op',
                  'side_effect_delta_vs_no_op', 'terrain_persistence_delta_vs_no_op',
              ],
              limit=40,
          ))
          (out_dir / 'TASK2_8E_ARBITRARY_RISK_DYNAMICS_SANDBOX_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:260]))
          if errors:
              raise SystemExit('Task2-8e validation errors')
          PY

      - name: Upload Task2-8e artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8e-arbitrary-risk-dynamics-sandbox-rc1
          path: results/task2_8e_arbitrary_risk_dynamics_sandbox_rc1/
          if-no-files-found: error

name: Task2-8j-5 Fixed Map Contract

on:
  workflow_dispatch:

jobs:
  task2-8j-5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_5.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_5_fixed_map_contract import build_and_validate_fixed_map_contract
          out = Path('results/task2_8j_5_fixed_map_contract_rc1')
          out.mkdir(parents=True, exist_ok=True)
          fixed_map, evidence, final_summary, errors, summary = build_and_validate_fixed_map_contract()
          fixed_map.to_csv(out / 'fixed_map_contract.csv', index=False)
          evidence.to_csv(out / 'fixed_map_evidence.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_5_FIXED_MAP_CONTRACT_RC1.md').write_text('# Task 2-8j-5\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-5 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-5-fixed-map-contract-rc1
          path: results/task2_8j_5_fixed_map_contract_rc1/
          if-no-files-found: error

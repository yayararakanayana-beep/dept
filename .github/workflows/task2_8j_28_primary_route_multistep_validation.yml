name: Task2-8j-28 Primary Route Multistep Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/contracts/cycle_state.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/runner/fullspec_integrated_closed_loop_runner.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_surface_planning_module.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/task2_8j_fullspec_integration_bridge.py'
      - 'tests/test_fullspec_task2_8j_28_primary_route_multistep_validation.py'
      - '.github/workflows/task2_8j_28_primary_route_multistep_validation.yml'
      - 'docs/task2_8j_28_primary_route_multistep_validation.md'

jobs:
  task2-8j-28-primary-route-multistep-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run Task2-8j primary route multistep validation
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_fullspec_task2_8j_28_primary_route_multistep_validation.py

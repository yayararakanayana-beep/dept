name: Task2-8j-1 Candidate Feature Log

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_1_candidate_feature_log.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_1.py'
      - '.github/workflows/task2_8j_1_candidate_feature_log.yml'

jobs:
  task2-8j-1-candidate-feature-log:
    name: Task2-8j-1 candidate feature log
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8j-1 tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_1.py

      - name: Export Task2-8j-1 candidate feature log
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_1_candidate_feature_log import (
              CandidateFeatureLogConfig,
              build_and_validate_candidate_feature_log,
              build_candidate_feature_schema,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8j_1_candidate_feature_log_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          cfg = CandidateFeatureLogConfig(steps=18, seeds=(501, 502), window_sizes=(1, 6, 12))
          feature_log, input_audit, errors, summary = build_and_validate_candidate_feature_log(cfg)
          schema = build_candidate_feature_schema()

          feature_log.to_csv(out_dir / 'candidate_feature_log.csv', index=False)
          input_audit.to_csv(out_dir / 'feature_input_audit.csv', index=False)
          schema.to_csv(out_dir / 'candidate_feature_schema.csv', index=False)
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          feature_group_summary = feature_log.groupby(['source_trace', 'feature_group']).agg(
              rows=('feature_name', 'size'),
              unique_features=('feature_name', 'nunique'),
              temporal_rows=('temporal_feature', lambda s: int(s.astype(bool).sum())),
          ).reset_index()
          feature_group_summary.to_csv(out_dir / 'feature_group_summary.csv', index=False)

          window_summary = feature_log.groupby(['window_size', 'temporal_feature']).agg(
              rows=('feature_name', 'size'),
              unique_features=('feature_name', 'nunique'),
          ).reset_index()
          window_summary.to_csv(out_dir / 'window_summary.csv', index=False)

          md = []
          md.append('# Task 2-8j-1 Candidate Feature Log RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Candidate feature-log generation completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Feature input audit')
          md.append('')
          md.append(markdown_table(input_audit, list(input_audit.columns), limit=20))
          md.append('')
          md.append('## Feature group summary')
          md.append('')
          md.append(markdown_table(feature_group_summary, list(feature_group_summary.columns), limit=40))
          md.append('')
          md.append('## Window summary')
          md.append('')
          md.append(markdown_table(window_summary, list(window_summary.columns), limit=20))
          md.append('')
          md.append('## Sample candidate feature rows')
          md.append('')
          md.append(markdown_table(
              feature_log,
              ['seed', 'scenario', 't', 'window_id', 'source_trace', 'feature_group', 'feature_name', 'stat_name', 'feature_value', 'temporal_feature'],
              limit=80,
          ))

          (out_dir / 'TASK2_8J_1_CANDIDATE_FEATURE_LOG_RC1.md').write_text('\n'.join(md), encoding='utf-8')
          print('\n'.join(md[:360]))
          if errors:
              raise SystemExit('Task2-8j-1 validation errors')
          PY

      - name: Upload Task2-8j-1 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8j-1-candidate-feature-log-rc1
          path: results/task2_8j_1_candidate_feature_log_rc1/
          if-no-files-found: error

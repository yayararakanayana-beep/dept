name: Relation field single transition audit RF-4 RC1

on:
  pull_request:
    paths:
      - "configs/relation_field_single_transition_audit_rc1.json"
      - "scripts/relation_field_single_transition_audit_rc1.py"
      - "tests/test_relation_field_single_transition_audit_rc1.py"
      - "docs/relation_field_rc1/RF4_SINGLE_TRANSITION_AUDIT.md"
      - "scripts/relation_field_single_transition_rc1.py"
      - "scripts/relation_field_grid_rc1.py"
      - ".github/workflows/relation-field-single-transition-audit-rc1.yml"
  workflow_dispatch:

jobs:
  formal-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - name: Compile RF-2 through RF-4 modules
        run: |
          python -m py_compile scripts/relation_field_grid_rc1.py
          python -m py_compile scripts/relation_field_single_transition_rc1.py
          python -m py_compile scripts/relation_field_single_transition_audit_rc1.py
      - name: Run RF-2 through RF-4 regression tests
        run: |
          python -m pytest -q \
            tests/test_relation_field_grid_rc1.py \
            tests/test_relation_field_single_transition_rc1.py \
            tests/test_relation_field_single_transition_audit_rc1.py
      - name: Build RF-2 grid artifact
        run: |
          python scripts/relation_field_grid_rc1.py build \
            --output artifacts/relation_field_grid_rc1
      - name: Build RF-4 formal audit twice
        run: |
          python scripts/relation_field_single_transition_audit_rc1.py build \
            --grid-artifact artifacts/relation_field_grid_rc1 \
            --output artifacts/relation_field_single_transition_audit_rc1_a
          python scripts/relation_field_single_transition_audit_rc1.py build \
            --grid-artifact artifacts/relation_field_grid_rc1 \
            --output artifacts/relation_field_single_transition_audit_rc1_b
      - name: Verify deterministic rebuild
        run: |
          diff -qr \
            artifacts/relation_field_single_transition_audit_rc1_a \
            artifacts/relation_field_single_transition_audit_rc1_b
      - name: Validate RF-4 formal audit
        run: |
          python scripts/relation_field_single_transition_audit_rc1.py validate \
            --input artifacts/relation_field_single_transition_audit_rc1_a \
            --grid-artifact artifacts/relation_field_grid_rc1
      - uses: actions/upload-artifact@v4
        with:
          name: relation-field-single-transition-audit-rf4-rc1
          path: artifacts/relation_field_single_transition_audit_rc1_a
          retention-days: 30

name: Task2-8j-24c Provisional Action Module Design Lock

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24c_provisional_action_module_design_lock.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_24c.py'
      - '.github/workflows/task2_8j_24c_provisional_action_module_design_lock.yml'

jobs:
  task2-8j-24c:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_24c.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_24c_provisional_action_module_design_lock import build_and_validate_provisional_action_module_design_lock
          out = Path('results/task2_8j_24c_provisional_action_module_design_lock_rc1')
          out.mkdir(parents=True, exist_ok=True)
          design, policy, gates, fallbacks, exclusions, checks, final_summary, errors, summary = build_and_validate_provisional_action_module_design_lock()
          design.to_csv(out / 'provisional_action_module_design_contract.csv', index=False)
          policy.to_csv(out / 'provisional_policy_rules_ready_risks.csv', index=False)
          gates.to_csv(out / 'admission_gate_rules.csv', index=False)
          fallbacks.to_csv(out / 'noop_fallback_rules.csv', index=False)
          exclusions.to_csv(out / 'excluded_risk_tracks.csv', index=False)
          checks.to_csv(out / 'provisional_design_validation_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_24C_PROVISIONAL_ACTION_MODULE_DESIGN_LOCK_RC1.md').write_text('# Task 2-8j-24c\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-24c validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-24c-provisional-action-module-design-lock-rc1
          path: results/task2_8j_24c_provisional_action_module_design_lock_rc1/
          if-no-files-found: error

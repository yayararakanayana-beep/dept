name: Task2-8j-24c0 ActionModule Information Intake Bridge

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24c0_actionmodule_information_intake_bridge.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_24c0.py'
      - '.github/workflows/task2_8j_24c0_actionmodule_information_intake_bridge.yml'

jobs:
  task2-8j-24c0:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_24c0.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_24c0_actionmodule_information_intake_bridge import build_and_validate_actionmodule_information_intake_bridge
          out = Path('results/task2_8j_24c0_actionmodule_information_intake_bridge_rc1')
          out.mkdir(parents=True, exist_ok=True)
          contract, channels, packets, checks, final_summary, errors, summary = build_and_validate_actionmodule_information_intake_bridge()
          contract.to_csv(out / 'information_intake_contract.csv', index=False)
          channels.to_csv(out / 'input_channel_contract.csv', index=False)
          packets.to_csv(out / 'actionmodule_information_intake_packets.csv', index=False)
          checks.to_csv(out / 'information_intake_validation_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_24C0_ACTIONMODULE_INFORMATION_INTAKE_BRIDGE_RC1.md').write_text('# Task 2-8j-24c0\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-24c0 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-24c0-actionmodule-information-intake-bridge-rc1
          path: results/task2_8j_24c0_actionmodule_information_intake_bridge_rc1/
          if-no-files-found: error

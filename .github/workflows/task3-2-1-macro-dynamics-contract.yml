name: Task 3.2-1 Macro-Dynamics Data Contract

on:
  pull_request:
    paths:
      - 'configs/task3_2_1_macro_dynamics_contract.json'
      - 'scripts/task3_2_1_macro_dynamics_contract.py'
      - 'tests/test_task3_2_1_macro_dynamics_contract.py'
      - 'docs/task3_2_macro_dynamics_exploration/**'
      - '.github/workflows/task3-2-1-macro-dynamics-contract.yml'
      - 'AGENTS.md'
  workflow_dispatch:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest
      - name: Compile contract validator
        run: python -m py_compile scripts/task3_2_1_macro_dynamics_contract.py
      - name: Run Task 3.2-1 tests
        run: |
          set -o pipefail
          python -m pytest -vv tests/test_task3_2_1_macro_dynamics_contract.py 2>&1 | tee task3_2_1_pytest.log
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-2-1-pytest-diagnostics
          path: task3_2_1_pytest.log
          retention-days: 7

name: PseudoReality v3.3 full-distribution semantic axis candidate audit

on:
  pull_request:
  push:

jobs:
  audit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install numpy pandas pytest
      - name: Run Task 3.1d audit tests
        run: python -m pytest tests/test_pseudoreality_v3_3_full_distribution_semantic_axis_candidate_audit.py

name: Task2-8j-24c1 OT v8 Risk Sensing State

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24c1_ot_v8_to_risk_sensing_state.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24c0_actionmodule_information_intake_bridge.py'
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_22_gated_macro_game_risk_simulator_dry_run.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_24c1.py'
      - '.github/workflows/task2_8j_24c1_ot_v8_to_risk_sensing_state.yml'

jobs:
  task2-8j-24c1:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_24c1.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_24c1_ot_v8_to_risk_sensing_state import build_and_validate_ot_v8_risk_sensing_state
          out = Path('results/task2_8j_24c1_ot_v8_to_risk_sensing_state_rc1')
          out.mkdir(parents=True, exist_ok=True)
          states, quality, final_summary, errors, summary = build_and_validate_ot_v8_risk_sensing_state()
          states.to_csv(out / 'risk_sensing_input_states.csv', index=False)
          quality.to_csv(out / 'risk_sensing_state_quality.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_24C1_OT_V8_TO_RISK_SENSING_STATE_RC1.md').write_text('# Task 2-8j-24c1\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-24c1 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-24c1-ot-v8-risk-sensing-state-rc1
          path: results/task2_8j_24c1_ot_v8_to_risk_sensing_state_rc1/
          if-no-files-found: error

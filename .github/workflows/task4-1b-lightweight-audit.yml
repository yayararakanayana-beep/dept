name: Bootstrap Task 3.2-4.1b Audit

on:
  pull_request:
    paths:
      - '.github/workflows/task4-1b-lightweight-audit.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-audit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Install Task 4.1b implementation
        env:
          PAYLOAD_B64: [... ELLIPSIZATION ...]
        run: |
          python - <<'PY'
          import base64, os, pathlib
          pathlib.Path('/tmp/task4_1b_payload.tar.gz').write_bytes(base64.b64decode(os.environ['PAYLOAD_B64']))
          PY
          tar -xzf /tmp/task4_1b_payload.tar.gz
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit docs/task4_1b_audit .github/workflows/task4-1b-lightweight-audit.yml
          git commit -m 'Implement Task 4.1b lightweight audit'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

name: Task 3.2-4.1b Lightweight Audit

on:
  pull_request:
    paths:
      - 'audits/task4_1b_lightweight_audit.py'
      - 'audit_configs/task4_1b_lightweight_audit.json'
      - 'audit_tests/test_task4_1b_lightweight_audit.py'
      - 'audit_docs/task4_1b_lightweight_audit_design.md'
      - '.github/workflows/task4-1b-lightweight-audit.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  lightweight-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: ${{ github.workspace }}/audits:${{ github.workspace }}/scripts:${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install repository dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest
      - name: Compile audit module
        run: python -m py_compile audits/task4_1b_lightweight_audit.py
      - name: Run audit contract tests
        run: python -m pytest -vv audit_tests/test_task4_1b_lightweight_audit.py
      - name: Download frozen Task 4.1 formal artifact
        uses: actions/download-artifact@v4
        with:
          name: task3-2-4-1-structural-risk-formal
          path: work/task4_1_formal
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: 29173249679
      - name: Regenerate deterministic Task 4.1 source corpus
        run: |
          python scripts/task3_2_4_challenge_runner.py generate \
            --config configs/task3_2_4_1_structural_risk.json \
            --output work/task4_1b_corpus
          python scripts/task3_2_2_reference_calibration.py --input work/task4_1b_corpus
          python scripts/task3_2_4_challenge_runner.py validate \
            --config configs/task3_2_4_1_structural_risk.json \
            --input work/task4_1b_corpus
      - name: Run Task 4.1b lightweight audit
        run: |
          python audits/task4_1b_lightweight_audit.py run \
            --corpus work/task4_1b_corpus \
            --formal-artifact work/task4_1_formal \
            --output artifacts/task4_1b_audit
      - name: Validate Task 4.1b artifact
        run: python audits/task4_1b_lightweight_audit.py validate --input artifacts/task4_1b_audit
      - name: Upload Task 4.1b artifact
        uses: actions/upload-artifact@v4
        with:
          name: task4-1b-lightweight-audit
          path: artifacts/task4_1b_audit
          retention-days: 30

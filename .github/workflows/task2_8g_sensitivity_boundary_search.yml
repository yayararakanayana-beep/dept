name: Task2-8g Sensitivity Boundary Search

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8g.py'
      - '.github/workflows/task2_8g_sensitivity_boundary_search.yml'

jobs:
  task2-8g-sensitivity-boundary-search:
    name: Task2-8g sensitivity boundary search
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8g tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8g.py

      - name: Export Task2-8g sensitivity boundary tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8g_sensitivity_boundary_search import (
              build_and_validate_sensitivity_boundary_search_table,
              build_boundary_summary,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8g_sensitivity_boundary_search_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors, summary = build_and_validate_sensitivity_boundary_search_table()
          table.to_csv(out_dir / 'sensitivity_boundary_search.csv', index=False)

          positive = table[table['positive_tail_insurance_condition'].astype(bool)].sort_values('long_term_net_benefit', ascending=False)
          positive.to_csv(out_dir / 'positive_boundary_conditions.csv', index=False)

          boundary = build_boundary_summary(table)
          boundary.to_csv(out_dir / 'boundary_summary.csv', index=False)

          by_policy = table.groupby('policy').agg(
              rows=('policy', 'size'),
              positive_rows=('positive_tail_insurance_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_side=('side_effect_delta_vs_no_op', 'mean'),
              mean_crash_reduction=('crash_cost_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_policy.to_csv(out_dir / 'policy_summary.csv', index=False)

          by_risk = table.groupby(['risk_dynamics_type', 'initial_risk_level', 'policy']).agg(
              rows=('policy', 'size'),
              positive_rows=('positive_tail_insurance_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_side=('side_effect_delta_vs_no_op', 'mean'),
              mean_crash_reduction=('crash_cost_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_risk.to_csv(out_dir / 'risk_level_summary.csv', index=False)

          by_accuracy = table[table['prediction_required'].astype(bool)].groupby(['risk_dynamics_type', 'policy', 'prediction_accuracy']).agg(
              rows=('policy', 'size'),
              positive_rows=('positive_tail_insurance_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              correct_rate=('prediction_correct', lambda s: float(pd.Series(s).astype(bool).mean())),
              mean_side=('side_effect_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_accuracy.to_csv(out_dir / 'prediction_accuracy_summary.csv', index=False)

          side_by_strength = table[table['policy'].astype(str) != 'no_op'].groupby(['policy', 'strength_band', 'duration_band']).agg(
              rows=('policy', 'size'),
              mean_side=('side_effect_delta_vs_no_op', 'mean'),
              mean_short_gain_loss=('short_gain_loss_auc', 'mean'),
              mean_liquidity_loss=('liquidity_loss_auc', 'mean'),
              mean_overcooling_loss=('overcooling_loss_auc', 'mean'),
              mean_complexity_cost=('complexity_cost_auc', 'mean'),
              mean_net=('long_term_net_benefit', 'mean'),
          ).reset_index()
          side_by_strength.to_csv(out_dir / 'side_effect_strength_duration_summary.csv', index=False)

          summary = dict(summary)
          summary['validation_errors'] = errors
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-8g Sensitivity Boundary Search RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Sensitivity boundary search completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              if key not in {'boundary_summary', 'by_policy'}:
                  md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Policy summary')
          md.append('')
          md.append(markdown_table(by_policy, list(by_policy.columns), limit=20))
          md.append('')
          md.append('## Boundary summary')
          md.append('')
          md.append(markdown_table(boundary, list(boundary.columns), limit=40))
          md.append('')
          md.append('## Prediction accuracy summary')
          md.append('')
          md.append(markdown_table(by_accuracy, list(by_accuracy.columns), limit=40))
          md.append('')
          md.append('## Top positive boundary conditions')
          md.append('')
          md.append(markdown_table(
              positive,
              [
                  'risk_dynamics_type', 'risk_dynamics_ja', 'initial_risk_level', 'crash_threshold',
                  'policy', 'prediction_accuracy', 'prediction_correct', 'terrain_actions_ja',
                  'strength_band', 'duration_band', 'timing_band', 'long_term_net_benefit',
                  'risk_auc_delta_vs_no_op', 'crash_cost_delta_vs_no_op',
                  'irreversibility_delta_vs_no_op', 'side_effect_delta_vs_no_op', 'regime_class',
              ],
              limit=40,
          ))
          (out_dir / 'TASK2_8G_SENSITIVITY_BOUNDARY_SEARCH_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:320]))
          if errors:
              raise SystemExit('Task2-8g validation errors')
          PY

      - name: Upload Task2-8g artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8g-sensitivity-boundary-search-rc1
          path: results/task2_8g_sensitivity_boundary_search_rc1/
          if-no-files-found: error

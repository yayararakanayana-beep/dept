name: Closed Loop Verification Manual

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Verification mode"
        required: true
        default: "baseline"
        type: choice
        options:
          - baseline
      upload_artifact:
        description: "Upload generated reports as an artifact"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  verify:
    name: Manual closed loop verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas pytest

      - name: Run baseline closed loop verification
        if: ${{ inputs.mode == 'baseline' }}
        run: |
          python scripts/run_closed_loop_verification_rc1.py

      - name: List generated reports
        if: always()
        run: |
          echo "Generated report files:"
          find reports/closed_loop_verification_rc1 -maxdepth 2 -type f -print || true

      - name: Upload verification artifact
        if: ${{ always() && inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: closed-loop-verification-manual-${{ inputs.mode }}
          path: |
            reports/closed_loop_verification_rc1/**
          if-no-files-found: warn
          retention-days: 14

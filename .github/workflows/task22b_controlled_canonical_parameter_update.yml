name: Task22B Controlled Canonical Parameter Update

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  task22b-controlled-canonical-parameter-update:
    name: Task22B controlled canonical parameter update
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --upgrade pip

      - name: Install requirements
        timeout-minutes: 5
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        timeout-minutes: 5
        run: python -m pip install pytest

      - name: Run Task22B validation
        timeout-minutes: 10
        run: python validation/task22_controlled_canonical_parameter_update_rc1.py

      - name: Print Task22B result logs
        if: always()
        run: |
          if [ -f results/task22_controlled_canonical_parameter_update_rc1/update_comparison_summary.md ]; then
            cat results/task22_controlled_canonical_parameter_update_rc1/update_comparison_summary.md
          fi
          if [ -f results/task22_controlled_canonical_parameter_update_rc1/update_validation_summary.md ]; then
            cat results/task22_controlled_canonical_parameter_update_rc1/update_validation_summary.md
          fi
          if [ -f results/task22_controlled_canonical_parameter_update_rc1/update_validation_summary.json ]; then
            cat results/task22_controlled_canonical_parameter_update_rc1/update_validation_summary.json
          fi

      - name: Run Task22B artifact/schema tests
        timeout-minutes: 5
        run: pytest -q tests/test_task22_controlled_canonical_parameter_update_rc1.py

      - name: Upload Task22B result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task22b-controlled-canonical-parameter-update-rc1
          path: results/task22_controlled_canonical_parameter_update_rc1/
          if-no-files-found: error

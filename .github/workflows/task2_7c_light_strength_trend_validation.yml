name: Task2-7c Light Strength Trend Validation

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_7c.py'
      - '.github/workflows/task2_7c_light_strength_trend_validation.yml'

jobs:
  task2-7c-light-strength-trend:
    name: Task2-7c light strength trend validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-7c tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_7c.py

      - name: Export Task2-7c light strength trend tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_7c_light_strength_trend_validation import (
              build_and_validate_strength_trend_light_validation_table,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_7c_light_strength_trend_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors, summary = build_and_validate_strength_trend_light_validation_table()
          table.to_csv(out_dir / 'strength_trend_light_validation.csv', index=False)

          by_multiplier = table.groupby('strength_multiplier').agg(
              rows=('strength_multiplier', 'size'),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_risk_auc_reduction=('risk_auc_reduction', 'mean'),
              mean_gain_delta=('gain_auc_delta_vs_no_op', 'mean'),
              mean_side_effect_auc=('side_effect_auc', 'mean'),
              reversal_rows=('risk_trend_class', lambda s: int((s == 'trend_reversal').sum())),
              damping_rows=('risk_trend_class', lambda s: int((s == 'trend_damping').sum())),
              side_effect_dominant_rows=('risk_trend_class', lambda s: int((s == 'side_effect_dominant').sum())),
          ).reset_index()
          by_multiplier.to_csv(out_dir / 'strength_multiplier_summary.csv', index=False)

          by_action = table.groupby(['action_channel', 'action_name_ja']).agg(
              rows=('action_channel', 'size'),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_risk_auc_reduction=('risk_auc_reduction', 'mean'),
              mean_gain_delta=('gain_auc_delta_vs_no_op', 'mean'),
              mean_side_effect_auc=('side_effect_auc', 'mean'),
              reversal_rows=('risk_trend_class', lambda s: int((s == 'trend_reversal').sum())),
              damping_rows=('risk_trend_class', lambda s: int((s == 'trend_damping').sum())),
          ).reset_index()
          by_action.to_csv(out_dir / 'action_summary.csv', index=False)

          summary = dict(summary)
          summary['validation_errors'] = errors
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-7c Light Strength Trend Validation RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Strength/trend validation completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Strength multiplier summary')
          md.append('')
          md.append(markdown_table(by_multiplier, list(by_multiplier.columns), limit=20))
          md.append('')
          md.append('## Action summary')
          md.append('')
          md.append(markdown_table(by_action, list(by_action.columns), limit=20))
          (out_dir / 'TASK2_7C_LIGHT_STRENGTH_TREND_VALIDATION_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:220]))
          if errors:
              raise SystemExit('Task2-7c validation errors')
          PY

      - name: Upload Task2-7c artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-7c-light-strength-trend-validation-rc1
          path: results/task2_7c_light_strength_trend_rc1/
          if-no-files-found: error

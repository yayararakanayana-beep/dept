name: Task2-8j-7b O_t Audit Layering

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_7b_ot_audit_layering.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_7b.py'
      - '.github/workflows/task2_8j_7b_ot_audit_layering.yml'

jobs:
  task2-8j-7b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_7b.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_7b_ot_audit_layering import build_and_validate_ot_audit_layering
          out = Path('results/task2_8j_7b_ot_audit_layering_rc1')
          out.mkdir(parents=True, exist_ok=True)
          audit_layers, reason_summary, final_summary, errors, summary = build_and_validate_ot_audit_layering()
          audit_layers.to_csv(out / 'ot_audit_layers.csv', index=False)
          reason_summary.to_csv(out / 'ot_audit_reason_summary.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_7B_OT_AUDIT_LAYERING_RC1.md').write_text('# Task 2-8j-7b\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-7b validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-7b-ot-audit-layering-rc1
          path: results/task2_8j_7b_ot_audit_layering_rc1/
          if-no-files-found: error

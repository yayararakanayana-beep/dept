name: Task2-8f High-Risk Crash Cost Sandbox

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8f.py'
      - '.github/workflows/task2_8f_high_risk_crash_cost_sandbox.yml'

jobs:
  task2-8f-high-risk-crash-cost-sandbox:
    name: Task2-8f high-risk crash cost sandbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8f tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8f.py

      - name: Export Task2-8f high-risk crash cost sandbox tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8f_high_risk_crash_cost_sandbox import (
              build_and_validate_high_risk_crash_cost_sandbox_table,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8f_high_risk_crash_cost_sandbox_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors, summary = build_and_validate_high_risk_crash_cost_sandbox_table()
          table.to_csv(out_dir / 'high_risk_crash_cost_sandbox.csv', index=False)

          positive = table[table['positive_tail_insurance_condition'].astype(bool)].sort_values('long_term_net_benefit', ascending=False)
          positive.to_csv(out_dir / 'positive_tail_insurance_conditions.csv', index=False)

          by_strategy = table.groupby('strategy').agg(
              rows=('strategy', 'size'),
              positive_rows=('positive_tail_insurance_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_crash_delta=('crash_cost_delta_vs_no_op', 'mean'),
              mean_irreversibility_delta=('irreversibility_delta_vs_no_op', 'mean'),
              mean_auc_delta=('risk_auc_delta_vs_no_op', 'mean'),
              mean_gain_delta=('gain_auc_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_strategy.to_csv(out_dir / 'strategy_summary.csv', index=False)

          side_by_strategy = table.groupby('strategy').agg(
              short_gain_loss_mean=('short_gain_loss_auc', 'mean'),
              liquidity_loss_mean=('liquidity_loss_auc', 'mean'),
              overcooling_loss_mean=('overcooling_loss_auc', 'mean'),
              mismatch_cost_mean=('mismatch_cost_auc', 'mean'),
              complexity_cost_mean=('complexity_cost_auc', 'mean'),
          ).reset_index()
          side_by_strategy.to_csv(out_dir / 'side_effect_summary.csv', index=False)

          by_condition = table[table['strategy'].astype(str) != 'no_op'].groupby(['risk_dynamics_type', 'strategy', 'terrain_actions', 'strength_band', 'duration_band', 'timing_band']).agg(
              rows=('strategy', 'size'),
              positive_rows=('positive_tail_insurance_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_crash_delta=('crash_cost_delta_vs_no_op', 'mean'),
              mean_irreversibility_delta=('irreversibility_delta_vs_no_op', 'mean'),
              mean_auc_delta=('risk_auc_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_condition.to_csv(out_dir / 'condition_summary.csv', index=False)

          summary = dict(summary)
          summary['validation_errors'] = errors
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-8f High-Risk Crash Cost Sandbox RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('High-risk crash cost sandbox completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Strategy summary')
          md.append('')
          md.append(markdown_table(by_strategy, list(by_strategy.columns), limit=20))
          md.append('')
          md.append('## Side-effect decomposition')
          md.append('')
          md.append(markdown_table(side_by_strategy, list(side_by_strategy.columns), limit=20))
          md.append('')
          md.append('## Top positive tail-insurance conditions')
          md.append('')
          md.append(markdown_table(
              positive,
              [
                  'risk_dynamics_type', 'risk_dynamics_ja', 'strategy', 'terrain_actions_ja',
                  'strength_band', 'duration_band', 'timing_band', 'long_term_net_benefit',
                  'risk_auc_delta_vs_no_op', 'crash_cost_delta_vs_no_op',
                  'irreversibility_delta_vs_no_op', 'gain_auc_delta_vs_no_op',
                  'side_effect_delta_vs_no_op', 'short_gain_loss_auc', 'liquidity_loss_auc',
                  'overcooling_loss_auc', 'mismatch_cost_auc', 'complexity_cost_auc',
              ],
              limit=40,
          ))
          (out_dir / 'TASK2_8F_HIGH_RISK_CRASH_COST_SANDBOX_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:280]))
          if errors:
              raise SystemExit('Task2-8f validation errors')
          PY

      - name: Upload Task2-8f artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8f-high-risk-crash-cost-sandbox-rc1
          path: results/task2_8f_high_risk_crash_cost_sandbox_rc1/
          if-no-files-found: error

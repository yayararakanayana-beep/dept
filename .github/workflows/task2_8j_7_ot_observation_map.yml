name: Task2-8j-7 O_t Observation Map

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_7_ot_observation_map_from_relation_field.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_7.py'
      - '.github/workflows/task2_8j_7_ot_observation_map.yml'

jobs:
  task2-8j-7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_7.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_7_ot_observation_map_from_relation_field import build_and_validate_ot_observation_map_from_relation_field
          out = Path('results/task2_8j_7_ot_observation_map_rc1')
          out.mkdir(parents=True, exist_ok=True)
          observation_units, route_table, final_summary, errors, summary = build_and_validate_ot_observation_map_from_relation_field()
          observation_units.to_csv(out / 'ot_observation_units.csv', index=False)
          route_table.to_csv(out / 'ot_route_contract.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_7_OT_OBSERVATION_MAP_RC1.md').write_text('# Task 2-8j-7\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-7 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-7-ot-observation-map-rc1
          path: results/task2_8j_7_ot_observation_map_rc1/
          if-no-files-found: error

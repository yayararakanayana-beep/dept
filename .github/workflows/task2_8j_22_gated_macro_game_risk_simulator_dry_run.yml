name: Task2-8j-22 Gated Macro Game Risk Simulator Dry Run

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_22_gated_macro_game_risk_simulator_dry_run.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_22.py'
      - '.github/workflows/task2_8j_22_gated_macro_game_risk_simulator_dry_run.yml'

jobs:
  task2-8j-22:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_22.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_22_gated_macro_game_risk_simulator_dry_run import build_and_validate_gated_macro_game_risk_simulator_dry_run
          out = Path('results/task2_8j_22_gated_macro_game_risk_simulator_dry_run_rc1')
          out.mkdir(parents=True, exist_ok=True)
          states, gate, trajectories, risk_confidence, directions, checks, final_summary, errors, summary = build_and_validate_gated_macro_game_risk_simulator_dry_run()
          states.to_csv(out / 'coarse_macro_game_states.csv', index=False)
          gate.to_csv(out / 'observation_gate_results.csv', index=False)
          trajectories.to_csv(out / 'noop_risk_trajectories.csv', index=False)
          risk_confidence.to_csv(out / 'risk_confidence.csv', index=False)
          directions.to_csv(out / 'dynamics_direction.csv', index=False)
          checks.to_csv(out / 'gated_macro_game_risk_simulator_dry_run_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_22_GATED_MACRO_GAME_RISK_SIMULATOR_DRY_RUN_RC1.md').write_text('# Task 2-8j-22\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-22 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-22-gated-macro-game-risk-simulator-dry-run-rc1
          path: results/task2_8j_22_gated_macro_game_risk_simulator_dry_run_rc1/
          if-no-files-found: error

name: Fixed five-axis G_t K_t RC1

on:
  pull_request:
    paths:
      - "configs/fixed5axis_gk_rc1_contract.json"
      - "scripts/fixed5axis_gk_rc1.py"
      - "tests/test_fixed5axis_gk_rc1.py"
      - "docs/fixed5axis_gk_rc1/**"
      - ".github/workflows/fixed5axis-gk-rc1.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m pytest -q tests/test_fixed5axis_gk_rc1.py

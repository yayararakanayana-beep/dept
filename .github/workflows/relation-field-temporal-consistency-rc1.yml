name: Relation field temporal consistency RF-5 RC1

on:
  pull_request:
    paths:
      - "configs/relation_field_temporal_consistency_rc1.json"
      - "scripts/relation_field_temporal_consistency_rc1.py"
      - "tests/test_relation_field_temporal_consistency_rc1.py"
      - "tests/test_relation_field_temporal_precision_rc1.py"
      - "docs/relation_field_rc1/RF5_TEMPORAL_CONSISTENCY.md"
      - "scripts/relation_field_single_transition_rc1.py"
      - "scripts/relation_field_grid_rc1.py"
      - ".github/workflows/relation-field-temporal-consistency-rc1.yml"
  workflow_dispatch:

jobs:
  temporal-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - name: Compile RF-2 through RF-5 modules
        run: |
          python -m py_compile scripts/relation_field_grid_rc1.py
          python -m py_compile scripts/relation_field_single_transition_rc1.py
          python -m py_compile scripts/relation_field_temporal_consistency_rc1.py
      - name: Run RF-2, RF-3, and RF-5 regression tests
        id: rf5_tests
        continue-on-error: true
        run: |
          python -m pytest -vv --tb=short \
            tests/test_relation_field_grid_rc1.py \
            tests/test_relation_field_single_transition_rc1.py \
            tests/test_relation_field_temporal_consistency_rc1.py \
            tests/test_relation_field_temporal_precision_rc1.py \
            > rf5-test.log 2>&1
      - name: Print RF-5 test log
        if: always()
        run: cat rf5-test.log
      - name: Upload RF-5 test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relation-field-rf5-test-log
          path: rf5-test.log
          retention-days: 7
      - name: Preserve RF-5 test result
        if: steps.rf5_tests.outcome == 'failure'
        run: exit 1
      - name: Build RF-2 grid artifact
        run: |
          python scripts/relation_field_grid_rc1.py build \
            --output artifacts/relation_field_grid_rc1
      - name: Create deterministic canonical K_t fixture
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import sys
          from pathlib import Path
          import numpy as np

          sys.path.insert(0, "scripts")
          from relation_field_single_transition_rc1 import (
              GENESIS_HASH,
              _compute_gt_hash,
              _compute_history_chain_hash,
          )

          root = Path("artifacts/rf5_demo_trajectory")
          root.mkdir(parents=True, exist_ok=False)
          cell_ids = [0, 6, 12, 18]
          frames = []
          for cell_id in cell_ids:
              mass = np.zeros(3125, dtype=np.float64)
              mass[cell_id] = 1.0
              frames.append(mass.reshape((5, 5, 5, 5, 5)))
          np.save(root / "gt_mass.npy", np.stack(frames), allow_pickle=False)

          fields = (
              "trajectory_id", "source_trajectory_id", "t", "phase", "gt_row_index",
              "gt_hash", "previous_gt_hash", "history_chain_hash", "delta_t",
              "continuity_status", "admissible_for_research", "source_state_ref",
              "source_state_hash",
          )
          rows = []
          previous_gt_hash = ""
          chain_hash = GENESIS_HASH
          for t, frame in enumerate(frames):
              source_state_hash = hashlib.sha256(f"rf5-demo-state-{t}-{cell_ids[t]}".encode()).hexdigest()
              gt_hash = _compute_gt_hash(
                  trajectory_id="traj_rf5_demo",
                  t=t,
                  distribution=frame,
                  source_state_hash=source_state_hash,
              )
              chain_hash = _compute_history_chain_hash(chain_hash, gt_hash, t)
              rows.append({
                  "trajectory_id": "traj_rf5_demo",
                  "source_trajectory_id": "traj_rf5_demo",
                  "t": t,
                  "phase": "pre_transition",
                  "gt_row_index": t,
                  "gt_hash": gt_hash,
                  "previous_gt_hash": previous_gt_hash,
                  "history_chain_hash": chain_hash,
                  "delta_t": 0 if t == 0 else 1,
                  "continuity_status": "initial" if t == 0 else "continuous",
                  "admissible_for_research": True,
                  "source_state_ref": f"states/step_{t:06d}.npz",
                  "source_state_hash": source_state_hash,
              })
              previous_gt_hash = gt_hash
          with (root / "history_ledger.csv").open("w", encoding="utf-8", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=fields, lineterminator="\n")
              writer.writeheader()
              writer.writerows(rows)
          PY
      - name: Build RF-5 artifact twice
        run: |
          python scripts/relation_field_temporal_consistency_rc1.py build \
            --trajectory artifacts/rf5_demo_trajectory \
            --grid-artifact artifacts/relation_field_grid_rc1 \
            --output artifacts/relation_field_temporal_consistency_rc1_a \
            --start-t 0 \
            --to-t 3
          python scripts/relation_field_temporal_consistency_rc1.py build \
            --trajectory artifacts/rf5_demo_trajectory \
            --grid-artifact artifacts/relation_field_grid_rc1 \
            --output artifacts/relation_field_temporal_consistency_rc1_b \
            --start-t 0 \
            --to-t 3
      - name: Verify deterministic rebuild
        run: |
          diff -qr \
            artifacts/relation_field_temporal_consistency_rc1_a \
            artifacts/relation_field_temporal_consistency_rc1_b
      - name: Validate RF-5 artifact
        run: |
          python scripts/relation_field_temporal_consistency_rc1.py validate \
            --input artifacts/relation_field_temporal_consistency_rc1_a \
            --grid-artifact artifacts/relation_field_grid_rc1
      - uses: actions/upload-artifact@v4
        with:
          name: relation-field-temporal-consistency-rf5-rc1
          path: artifacts/relation_field_temporal_consistency_rc1_a
          retention-days: 30

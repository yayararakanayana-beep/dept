name: PseudoReality v3 Validation

on:
  pull_request:
    paths:
      - "pseudo_reality/**"
      - "scripts/pseudoreality_v3_*.py"
      - "tests/test_distribution_terrain_v3*.py"
      - "tests/test_pseudoreality_v3*.py"
      - "configs/world_profiles/pseudo_reality_v3_distribution_terrain.json"
      - ".github/workflows/pseudoreality-v3-validation.yml"
  push:
    branches:
      - main
    paths:
      - "pseudo_reality/**"
      - "scripts/pseudoreality_v3_*.py"
      - "tests/test_distribution_terrain_v3*.py"
      - "tests/test_pseudoreality_v3*.py"
      - "configs/world_profiles/pseudo_reality_v3_distribution_terrain.json"
      - ".github/workflows/pseudoreality-v3-validation.yml"
  workflow_dispatch:

concurrency:
  group: pseudoreality-v3-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pseudoreality-v3-light-validation:
    name: PseudoReality v3 light validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Compile PseudoReality v3 modules
        run: |
          python -m py_compile pseudo_reality/distribution_terrain_v3.py
          python -m py_compile pseudo_reality/distribution_terrain_v3_scenarios.py
          python -m py_compile scripts/pseudoreality_v3_typical_pattern_suite.py
          python -m py_compile scripts/pseudoreality_v3_medium_pattern_validation.py
          python -m py_compile scripts/pseudoreality_v3_terrain_operation_effectiveness.py
          python -m py_compile scripts/pseudoreality_v3_seed_variation_validation.py
          python -m py_compile scripts/pseudoreality_v3_long_horizon_validation.py

      - name: Run PseudoReality v3 smoke and scenario tests
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/test-debug
          set -o pipefail
          pytest tests/test_distribution_terrain_v3_smoke.py tests/test_distribution_terrain_v3_scenarios.py tests/test_pseudoreality_v3_medium_pattern_validation.py tests/test_pseudoreality_v3_terrain_operation_effectiveness.py tests/test_pseudoreality_v3_seed_variation_validation.py tests/test_pseudoreality_v3_long_horizon_validation.py -q 2>&1 | tee outputs/pseudoreality-v3-validation/test-debug/pytest.log

      - name: Run scenario suites and export summaries
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/default
          mkdir -p outputs/pseudoreality-v3-validation/stable
          python - <<'PY'
          from pathlib import Path
          from pseudo_reality.distribution_terrain_v3_scenarios import (
              run_default_scenario_suite,
              run_stable_scenario_suite,
          )

          root = Path("outputs/pseudoreality-v3-validation")

          def export_suite(name, run_suite):
              output_dir = root / name
              output_dir.mkdir(parents=True, exist_ok=True)
              summary, traces_by_scenario = run_suite(seed=0, steps=10)
              summary.to_csv(output_dir / "scenario_summary.csv", index=False)
              summary.to_json(output_dir / "scenario_summary.json", orient="records", indent=2)

              for scenario_name, traces in traces_by_scenario.items():
                  safe_name = scenario_name.replace("/", "_").replace(" ", "_")
                  for trace_name, frame in traces.items():
                      frame.to_csv(output_dir / f"{safe_name}_{trace_name}.csv", index=False)

              print(f"\n=== {name} scenario summary ===")
              print(summary.to_string(index=False))

          export_suite("default", run_default_scenario_suite)
          export_suite("stable", run_stable_scenario_suite)
          PY

      - name: Run medium pattern dominance validation
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/medium-pattern
          python - <<'PY'
          from pathlib import Path
          import traceback

          error_path = Path("outputs/pseudoreality-v3-validation/medium-pattern/error.txt")
          try:
              from scripts.pseudoreality_v3_medium_pattern_validation import (
                  compact_readout,
                  run_medium_pattern_validation,
              )
              table = run_medium_pattern_validation("outputs/pseudoreality-v3-validation/medium-pattern")
              print(compact_readout(table).to_string(index=False))
          except Exception:
              error_path.write_text(traceback.format_exc(), encoding="utf-8")
              raise
          PY

      - name: Run terrain operation effectiveness validation
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/terrain-operation-effectiveness
          python - <<'PY'
          from pathlib import Path
          import traceback

          error_path = Path("outputs/pseudoreality-v3-validation/terrain-operation-effectiveness/error.txt")
          try:
              from scripts.pseudoreality_v3_terrain_operation_effectiveness import (
                  compact_readout,
                  export_damage_recovery_timing_sweep,
                  export_terrain_operation_effectiveness,
              )
              output_root = "outputs/pseudoreality-v3-validation/terrain-operation-effectiveness"
              table = export_terrain_operation_effectiveness(output_root, seed=0, steps=30)
              print("\n=== terrain operation candidate comparison ===")
              print(compact_readout(table).to_string(index=False))
              sweep_table = export_damage_recovery_timing_sweep(output_root, seed=0, steps=30)
              print("\n=== damage recovery timing strength duration sweep ===")
              print(compact_readout(sweep_table).to_string(index=False))
          except Exception:
              error_path.write_text(traceback.format_exc(), encoding="utf-8")
              raise
          PY

      - name: Run seed variation validation
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/seed-variation
          python - <<'PY'
          from pathlib import Path
          import traceback

          error_path = Path("outputs/pseudoreality-v3-validation/seed-variation/error.txt")
          try:
              from scripts.pseudoreality_v3_seed_variation_validation import (
                  compact_aggregate_readout,
                  export_seed_variation_validation,
              )
              _per_seed, aggregate = export_seed_variation_validation(
                  "outputs/pseudoreality-v3-validation/seed-variation",
                  seeds=(0, 1, 2, 3, 4),
                  steps=30,
              )
              print(compact_aggregate_readout(aggregate).to_string(index=False))
          except Exception:
              error_path.write_text(traceback.format_exc(), encoding="utf-8")
              raise
          PY

      - name: Run long horizon validation
        run: |
          mkdir -p outputs/pseudoreality-v3-validation/long-horizon
          python - <<'PY'
          from pathlib import Path
          import traceback

          error_path = Path("outputs/pseudoreality-v3-validation/long-horizon/error.txt")
          try:
              from scripts.pseudoreality_v3_long_horizon_validation import (
                  compact_trend_readout,
                  export_long_horizon_validation,
              )
              _per_horizon, trend = export_long_horizon_validation(
                  "outputs/pseudoreality-v3-validation/long-horizon",
                  seed=0,
                  steps_set=(50, 100, 200),
              )
              print(compact_trend_readout(trend).to_string(index=False))
          except Exception:
              error_path.write_text(traceback.format_exc(), encoding="utf-8")
              raise
          PY

      - name: Upload PseudoReality v3 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pseudoreality-v3-validation-summary
          path: outputs/pseudoreality-v3-validation/
          if-no-files-found: warn

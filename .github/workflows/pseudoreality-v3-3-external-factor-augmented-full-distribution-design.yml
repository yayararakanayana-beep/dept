name: PseudoReality v3.3 Task 3.1e External Factor Augmented Full Distribution Design

on:
  pull_request:
  push:

jobs:
  test-task-3-1e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Task 3.1e tests
        run: python -m pytest tests/test_pseudoreality_v3_3_external_factor_augmented_full_distribution_design.py

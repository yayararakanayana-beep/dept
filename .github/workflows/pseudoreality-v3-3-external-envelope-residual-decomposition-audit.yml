name: PseudoReality v3.3 external-envelope residual decomposition audit

on:
  pull_request:
  push:

jobs:
  residual-decomposition-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run Task 3.1c residual decomposition tests
        run: python -m pytest tests/test_pseudoreality_v3_3_external_envelope_residual_decomposition_audit.py -q

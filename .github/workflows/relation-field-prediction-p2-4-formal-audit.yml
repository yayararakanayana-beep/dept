name: Relation Field Prediction P2-4 Formal Audit

on:
  pull_request:
    paths:
      - 'configs/relation_field_prediction_p2_precursor_audit_contract_v1_1.json'
      - 'configs/relation_field_prediction_p2_formal_audit_dataset_v1.json'
      - 'scripts/relation_field_prediction_p2_precursor_audit/**'
      - 'tests/test_relation_field_prediction_p2_formal_audit.py'
      - 'validation/relation_field_prediction_p2_formal_audit.py'
      - 'docs/relation_field_prediction/P2_4_FORMAL_PRECURSOR_AUDIT.md'
      - '.github/workflows/relation-field-prediction-p2-4-formal-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  formal-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Parse plans and compile modules
        run: |
          python -m json.tool configs/relation_field_prediction_p2_precursor_audit_contract_v1_1.json >/dev/null
          python -m json.tool configs/relation_field_prediction_p2_formal_audit_dataset_v1.json >/dev/null
          python -m py_compile             scripts/relation_field_prediction_p2_precursor_audit/*.py             validation/relation_field_prediction_p2_formal_audit.py             tests/test_relation_field_prediction_p2_formal_audit.py
      - name: Run applicability and formal-plan tests
        run: |
          PYTHONPATH=scripts:validation python -m pytest -q             tests/test_relation_field_prediction_p2_precursor_audit.py             tests/test_relation_field_prediction_p2_formal_audit.py
      - name: Run 36-case formal audit and capture log
        shell: bash
        run: |
          set +e
          PYTHONPATH=scripts python             validation/relation_field_prediction_p2_formal_audit.py             --work-dir results/p2_4_formal_audit             > p2-4-formal-audit.log 2>&1
          status=$?
          echo "$status" > p2-4-formal-audit.exit
          exit 0
      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relation-field-p2-4-formal-audit-log
          path: |
            p2-4-formal-audit.log
            p2-4-formal-audit.exit
          if-no-files-found: error
          retention-days: 14
      - name: Enforce execution result
        run: |
          tail -n 300 p2-4-formal-audit.log
          test "$(cat p2-4-formal-audit.exit)" = "0"
      - name: Validate generated audit again
        run: |
          PYTHONPATH=scripts python -m             relation_field_prediction_p2_precursor_audit validate             results/p2_4_formal_audit/audit             results/p2_4_formal_audit/case_manifest.json
      - name: Enforce formal support and print decision
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root=Path('results/p2_4_formal_audit')
          support=json.loads((root/'audit'/'support_audit.json').read_text())
          decision=json.loads((root/'audit'/'decision.json').read_text())
          summary=json.loads((root/'formal_audit_summary.json').read_text())
          assert support['test_case_count']==36, support
          assert support['required_cell_count']==11, support
          assert support['supported_required_cell_count']==11, support
          assert support['contractually_inapplicable_cell_count']==1, support
          assert support['all_target_horizon_cells_supported'] is True, support
          assert decision['status'] in {
              'blocked_no_supported_precursor_signal',
              'eligible_for_partial_phase3_model_comparison',
              'eligible_for_full_phase3_model_comparison',
          }, decision
          assert summary['real_world_generalization_claim'] is False
          print(json.dumps(summary,ensure_ascii=False,indent=2,sort_keys=True))
          PY
      - name: Upload compact formal audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relation-field-p2-4-formal-audit
          path: |
            results/p2_4_formal_audit/audit
            results/p2_4_formal_audit/case_manifest.json
            results/p2_4_formal_audit/dataset_plan_frozen.json
            results/p2_4_formal_audit/expected_support_preflight.json
            results/p2_4_formal_audit/formal_audit_summary.json
          if-no-files-found: error
          retention-days: 14

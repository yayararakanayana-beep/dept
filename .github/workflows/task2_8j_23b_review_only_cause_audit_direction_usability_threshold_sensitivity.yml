name: Task2-8j-23b Review Only Cause Audit Direction Usability Threshold Sensitivity

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_23b_review_only_cause_audit_direction_usability_threshold_sensitivity.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_23b.py'
      - '.github/workflows/task2_8j_23b_review_only_cause_audit_direction_usability_threshold_sensitivity.yml'

jobs:
  task2-8j-23b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_23b.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_23b_review_only_cause_audit_direction_usability_threshold_sensitivity import build_and_validate_review_only_cause_audit_threshold_sensitivity
          out = Path('results/task2_8j_23b_review_only_cause_audit_direction_usability_threshold_sensitivity_rc1')
          out.mkdir(parents=True, exist_ok=True)
          cause_audit, cause_summary, sensitivity, checks, final_summary, errors, summary = build_and_validate_review_only_cause_audit_threshold_sensitivity()
          cause_audit.to_csv(out / 'review_only_cause_audit.csv', index=False)
          cause_summary.to_csv(out / 'review_only_cause_summary.csv', index=False)
          sensitivity.to_csv(out / 'direction_usability_threshold_sensitivity.csv', index=False)
          checks.to_csv(out / 'review_only_cause_audit_sensitivity_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_23B_REVIEW_ONLY_CAUSE_AUDIT_DIRECTION_USABILITY_THRESHOLD_SENSITIVITY_RC1.md').write_text('# Task 2-8j-23b\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-23b validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-23b-review-only-cause-audit-direction-usability-threshold-sensitivity-rc1
          path: results/task2_8j_23b_review_only_cause_audit_direction_usability_threshold_sensitivity_rc1/
          if-no-files-found: error

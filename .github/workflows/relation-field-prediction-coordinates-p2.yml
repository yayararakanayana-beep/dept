name: Relation Field Prediction P2-2 Coordinates

on:
  pull_request:
    paths:
      - 'configs/relation_field_prediction_coordinates_p2_*.json'
      - 'scripts/relation_field_prediction_coordinates_p2.py'
      - 'scripts/relation_field_prediction_coordinates_p2/**'
      - 'tests/test_relation_field_prediction_coordinates_p2.py'
      - 'docs/relation_field_prediction/P2_2_COORDINATE_BUILDER.md'
      - '.github/workflows/relation-field-prediction-coordinates-p2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  p2-coordinates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Compile P2 modules
        run: python -m py_compile scripts/relation_field_prediction_coordinates_p2.py scripts/relation_field_prediction_coordinates_p2/*.py
      - name: Run P2 tests and capture full log
        id: p2_tests
        shell: bash
        run: |
          set +e
          PYTHONPATH=scripts python -m pytest -q tests/test_relation_field_prediction_coordinates_p2.py > p2-test.log 2>&1
          status=$?
          echo "$status" > p2-test.exit
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload P2 test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p2-test-log
          path: |
            p2-test.log
            p2-test.exit
          if-no-files-found: error
          retention-days: 7
      - name: Enforce P2 test result
        shell: bash
        run: |
          cat p2-test.log
          test "$(cat p2-test.exit)" = "0"
      - name: Run P1 regression
        run: PYTHONPATH=scripts python -m pytest -q tests/test_relation_field_prediction_state_p1.py

name: Task2-8d Terrain Reshaping Targeted Validation

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8d.py'
      - '.github/workflows/task2_8d_terrain_reshaping_targeted_validation.yml'

jobs:
  task2-8d-terrain-reshaping-targeted-validation:
    name: Task2-8d terrain reshaping targeted validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8d tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8d.py

      - name: Export Task2-8d targeted validation tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8d_terrain_reshaping_targeted_validation import (
              build_and_validate_terrain_reshaping_targeted_validation_table,
              build_targeted_candidate_table,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8d_terrain_reshaping_targeted_validation_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors, summary = build_and_validate_terrain_reshaping_targeted_validation_table()
          candidates = build_targeted_candidate_table()
          table.to_csv(out_dir / 'terrain_reshaping_targeted_validation.csv', index=False)
          candidates.to_csv(out_dir / 'targeted_candidate_table.csv', index=False)

          by_mode = table.groupby('mode').agg(
              rows=('mode', 'size'),
              mean_net=('long_term_net_benefit', 'mean'),
              positive_rows=('positive_net_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_peak_delta=('risk_peak_delta_vs_no_op', 'mean'),
              mean_auc_delta=('risk_auc_delta_vs_no_op', 'mean'),
              mean_gain_delta=('gain_auc_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
              mean_persistence=('post_action_persistence', 'mean'),
          ).reset_index()
          by_mode.to_csv(out_dir / 'mode_summary.csv', index=False)

          by_strength_duration = table[table['mode'].astype(str).isin(['terrain_targeted', 'combined_targeted'])].groupby(['mode', 'strength_band', 'duration_band']).agg(
              rows=('mode', 'size'),
              positive_rows=('positive_net_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_peak_delta=('risk_peak_delta_vs_no_op', 'mean'),
              mean_auc_delta=('risk_auc_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
              mean_persistence=('post_action_persistence', 'mean'),
          ).reset_index()
          by_strength_duration.to_csv(out_dir / 'strength_duration_summary.csv', index=False)

          positive = table[table['positive_net_condition'].astype(bool)].copy()
          positive = positive.sort_values('long_term_net_benefit', ascending=False)
          positive.to_csv(out_dir / 'positive_net_conditions.csv', index=False)

          summary = dict(summary)
          summary['validation_errors'] = errors
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-8d Terrain Reshaping Targeted Validation RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Targeted terrain reshaping validation completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Mode summary')
          md.append('')
          md.append(markdown_table(by_mode, list(by_mode.columns), limit=20))
          md.append('')
          md.append('## Strength x duration summary for targeted modes')
          md.append('')
          md.append(markdown_table(by_strength_duration, list(by_strength_duration.columns), limit=60))
          md.append('')
          md.append('## Top positive net conditions')
          md.append('')
          md.append(markdown_table(
              positive,
              [
                  'terrain_location_id', 'mode', 'strength_band', 'duration_band',
                  'long_term_net_benefit', 'risk_peak_delta_vs_no_op', 'risk_auc_delta_vs_no_op',
                  'gain_auc_delta_vs_no_op', 'side_effect_delta_vs_no_op',
                  'post_action_persistence', 'targeted_actions', 'matched_local_patterns',
              ],
              limit=40,
          ))
          (out_dir / 'TASK2_8D_TERRAIN_RESHAPING_TARGETED_VALIDATION_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:260]))
          if errors:
              raise SystemExit('Task2-8d validation errors')
          PY

      - name: Upload Task2-8d artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8d-terrain-reshaping-targeted-validation-rc1
          path: results/task2_8d_terrain_reshaping_targeted_validation_rc1/
          if-no-files-found: error

name: Relation Field Prediction P3-1 Connection

on:
  pull_request:
    paths:
      - "scripts/relation_field_prediction_p3_connection_check.py"
      - "tests/test_relation_field_prediction_p3_connection_check.py"
      - "docs/relation_field_prediction/P3_1_CONNECTION_CONFIRMATION.md"
      - ".github/workflows/relation-field-prediction-p3-1-connection.yml"
  workflow_dispatch:

jobs:
  connection-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest
      - name: Compile P3-1 connection checker
        run: python -m py_compile scripts/relation_field_prediction_p3_connection_check.py
      - name: Run P3-1 targeted tests
        run: python -m pytest --noconftest -q tests/test_relation_field_prediction_p3_connection_check.py

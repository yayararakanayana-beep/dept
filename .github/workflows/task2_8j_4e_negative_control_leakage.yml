name: Task2-8j-4e Negative Control Leakage

on:
  workflow_dispatch:

jobs:
  task2-8j-4e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_4e.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_1_candidate_feature_log import CandidateFeatureLogConfig
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_4e_negative_control_leakage_audit import PreFreezeValidationConfig, build_and_validate_4e_negative_control_leakage_audit
          out = Path('results/task2_8j_4e_negative_control_leakage_rc1')
          out.mkdir(parents=True, exist_ok=True)
          feature_cfg = CandidateFeatureLogConfig(steps=24, seeds=(501, 502, 503), window_sizes=(1, 6, 12))
          cfg = PreFreezeValidationConfig(component_counts=(7,), standard_component_count=6, shadow_component_count=7)
          control, leakage, final, errors, summary = build_and_validate_4e_negative_control_leakage_audit(feature_cfg, cfg)
          control.to_csv(out / 'negative_control.csv', index=False)
          leakage.to_csv(out / 'leakage_audit.csv', index=False)
          final.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_4E_NEGATIVE_CONTROL_LEAKAGE_RC1.md').write_text('# Task 2-8j-4e\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-4e validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-4e-negative-control-leakage-rc1
          path: results/task2_8j_4e_negative_control_leakage_rc1/
          if-no-files-found: error

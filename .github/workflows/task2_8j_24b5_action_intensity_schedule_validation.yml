name: Task2-8j-24b5 Action Intensity Schedule Validation

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24b5_action_intensity_schedule_validation.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_24b5.py'
      - '.github/workflows/task2_8j_24b5_action_intensity_schedule_validation.yml'

jobs:
  task2-8j-24b5:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_24b5.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_24b5_action_intensity_schedule_validation import build_and_validate_action_intensity_schedule_validation
          out = Path('results/task2_8j_24b5_action_intensity_schedule_validation_rc1')
          out.mkdir(parents=True, exist_ok=True)
          runtime, scoring, comparison, gradual, audit, checks, final_summary, errors, summary = build_and_validate_action_intensity_schedule_validation()
          runtime.to_csv(out / 'intensity_runtime_policy_view.csv', index=False)
          scoring.to_csv(out / 'intensity_validation_scoring_view.csv', index=False)
          comparison.to_csv(out / 'fixed_weak_medium_strong_comparison.csv', index=False)
          gradual.to_csv(out / 'gradual_ramp_validation.csv', index=False)
          audit.to_csv(out / 'side_effect_large_loss_audit.csv', index=False)
          checks.to_csv(out / 'intensity_schedule_validation_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_24B5_ACTION_INTENSITY_SCHEDULE_VALIDATION_RC1.md').write_text('# Task 2-8j-24b5\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-24b5 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-24b5-action-intensity-schedule-validation-rc1
          path: results/task2_8j_24b5_action_intensity_schedule_validation_rc1/
          if-no-files-found: error

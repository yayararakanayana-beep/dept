name: Task2-8j-24b V2 Sandbox Action Material Timing Validation

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24b_v2_sandbox_action_material_timing_validation.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_24b.py'
      - '.github/workflows/task2_8j_24b_v2_sandbox_action_material_timing_validation.yml'

jobs:
  task2-8j-24b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_24b.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_24b_v2_sandbox_action_material_timing_validation import build_and_validate_v2_sandbox_action_material_timing_validation
          out = Path('results/task2_8j_24b_v2_sandbox_action_material_timing_validation_rc1')
          out.mkdir(parents=True, exist_ok=True)
          sweep, noop, step_summary, tradeoff, threshold, checks, final_summary, errors, summary = build_and_validate_v2_sandbox_action_material_timing_validation()
          sweep.to_csv(out / 'v2_sandbox_action_material_timing_sweep.csv', index=False)
          noop.to_csv(out / 'no_op_vs_action_outcome.csv', index=False)
          step_summary.to_csv(out / 'step_count_sensitivity.csv', index=False)
          tradeoff.to_csv(out / 'confidence_timing_tradeoff.csv', index=False)
          threshold.to_csv(out / 'adoption_threshold_tradeoff_audit.csv', index=False)
          checks.to_csv(out / 'v2_sandbox_timing_validation_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_24B_V2_SANDBOX_ACTION_MATERIAL_TIMING_VALIDATION_RC1.md').write_text('# Task 2-8j-24b\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-24b validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-24b-v2-sandbox-action-material-timing-validation-rc1
          path: results/task2_8j_24b_v2_sandbox_action_material_timing_validation_rc1/
          if-no-files-found: error

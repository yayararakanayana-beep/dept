name: Task2-8j-9 Two Route Reception Dry Run

on:
  workflow_dispatch:

jobs:
  task2-8j-9:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_9.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_9_two_route_reception_dry_run import build_and_validate_two_route_reception_dry_run
          out = Path('results/task2_8j_9_two_route_reception_dry_run_rc1')
          out.mkdir(parents=True, exist_ok=True)
          envelopes, checks, receipt, final_summary, errors, summary = build_and_validate_two_route_reception_dry_run()
          envelopes.to_csv(out / 'two_route_reception_envelopes.csv', index=False)
          checks.to_csv(out / 'two_route_reception_checks.csv', index=False)
          receipt.to_csv(out / 'two_route_reception_receipt.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_9_TWO_ROUTE_RECEPTION_DRY_RUN_RC1.md').write_text('# Task 2-8j-9\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-9 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-9-two-route-reception-dry-run-rc1
          path: results/task2_8j_9_two_route_reception_dry_run_rc1/
          if-no-files-found: error

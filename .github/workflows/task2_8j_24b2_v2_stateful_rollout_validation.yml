name: Task2-8j-24b2 V2 Stateful Rollout Validation

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_24b2_v2_stateful_rollout_action_material_validation.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_24b2.py'
      - '.github/workflows/task2_8j_24b2_v2_stateful_rollout_validation.yml'

jobs:
  task2-8j-24b2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_24b2.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_24b2_v2_stateful_rollout_action_material_validation import build_and_validate_v2_stateful_rollout_action_material_validation
          out = Path('results/task2_8j_24b2_v2_stateful_rollout_validation_rc1')
          out.mkdir(parents=True, exist_ok=True)
          starts, rollout, step_summary, threshold, checks, final_summary, errors, summary = build_and_validate_v2_stateful_rollout_action_material_validation()
          starts.to_csv(out / 'v2_rollout_start_points.csv', index=False)
          rollout.to_csv(out / 'v2_stateful_rollout_noop_vs_action.csv', index=False)
          step_summary.to_csv(out / 'stateful_step_count_sensitivity.csv', index=False)
          threshold.to_csv(out / 'stateful_adoption_threshold_audit.csv', index=False)
          checks.to_csv(out / 'stateful_rollout_validation_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_24B2_V2_STATEFUL_ROLLOUT_VALIDATION_RC1.md').write_text('# Task 2-8j-24b2\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-24b2 validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-24b2-v2-stateful-rollout-validation-rc1
          path: results/task2_8j_24b2_v2_stateful_rollout_validation_rc1/
          if-no-files-found: error

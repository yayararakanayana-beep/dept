name: Task2-8j-22b V8 Style Risk Confidence Calibration Audit

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_22b_v8_style_risk_confidence_calibration_audit.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_22b.py'
      - '.github/workflows/task2_8j_22b_v8_style_risk_confidence_calibration_audit.yml'

jobs:
  task2-8j-22b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_22b.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_22b_v8_style_risk_confidence_calibration_audit import build_and_validate_v8_style_risk_confidence_calibration_audit
          out = Path('results/task2_8j_22b_v8_style_risk_confidence_calibration_audit_rc1')
          out.mkdir(parents=True, exist_ok=True)
          calibration, info, plan, checks, final_summary, errors, summary = build_and_validate_v8_style_risk_confidence_calibration_audit()
          calibration.to_csv(out / 'v8_style_risk_confidence_calibration_audit.csv', index=False)
          info.to_csv(out / 'information_sufficiency_review.csv', index=False)
          plan.to_csv(out / 'delayed_observation_calibration_plan.csv', index=False)
          checks.to_csv(out / 'v8_style_calibration_audit_checks.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_22B_V8_STYLE_RISK_CONFIDENCE_CALIBRATION_AUDIT_RC1.md').write_text('# Task 2-8j-22b\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-22b validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-22b-v8-style-risk-confidence-calibration-audit-rc1
          path: results/task2_8j_22b_v8_style_risk_confidence_calibration_audit_rc1/
          if-no-files-found: error

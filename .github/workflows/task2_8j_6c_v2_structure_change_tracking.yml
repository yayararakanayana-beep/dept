name: Task2-8j-6c V2 Structure Change Tracking

on:
  workflow_dispatch:
  push:
    branches:
      - action-upper-pressure-reception-split-rc1
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/pressure_action_task2_8j_6c_v2_structure_change_relation_field_tracking.py'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8j_6c.py'
      - '.github/workflows/task2_8j_6c_v2_structure_change_tracking.yml'

jobs:
  task2-8j-6c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8j_6c.py
      - name: Export tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8j_6c_v2_structure_change_relation_field_tracking import V2StructureChangeTrackingConfig, build_and_validate_v2_structure_change_relation_field_tracking
          out = Path('results/task2_8j_6c_v2_structure_change_tracking_rc1')
          out.mkdir(parents=True, exist_ok=True)
          phase_table, edge_change, stale_updated, final_summary, errors, summary = build_and_validate_v2_structure_change_relation_field_tracking(V2StructureChangeTrackingConfig())
          phase_table.to_csv(out / 'phase_state_reproduction.csv', index=False)
          edge_change.to_csv(out / 'phase_relation_field_edge_change.csv', index=False)
          stale_updated.to_csv(out / 'stale_vs_updated_relation_field.csv', index=False)
          final_summary.to_csv(out / 'final_summary.csv', index=False)
          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          (out / 'TASK2_8J_6C_V2_STRUCTURE_CHANGE_TRACKING_RC1.md').write_text('# Task 2-8j-6c\n\n' + json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          if errors:
              raise SystemExit('Task2-8j-6c validation errors')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task2-8j-6c-v2-structure-change-tracking-rc1
          path: results/task2_8j_6c_v2_structure_change_tracking_rc1/
          if-no-files-found: error

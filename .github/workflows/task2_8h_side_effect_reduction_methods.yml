name: Task2-8h Side-Effect Reduction Methods

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'localprep1/dept/dept2_fullspec_runner_rc1/modules/action_policies/**'
      - 'tests/test_action_module_upper_pressure_reception_split_task2_8h.py'
      - '.github/workflows/task2_8h_side_effect_reduction_methods.yml'

jobs:
  task2-8h-side-effect-reduction-methods:
    name: Task2-8h side-effect reduction methods
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Task2-8h tests
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: pytest -q tests/test_action_module_upper_pressure_reception_split_task2_8h.py

      - name: Export Task2-8h side-effect reduction tables
        if: always()
        env:
          PYTHONPATH: localprep1/dept:localprep1/dept/DEPT2_ActionModule_ActuationPrimitives_RC1
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          from dept2_fullspec_runner_rc1.modules.action_policies.pressure_action_task2_8h_side_effect_reduction_methods import (
              build_and_validate_side_effect_reduction_methods_table,
          )

          def markdown_table(df, columns, limit=80):
              if df is None or df.empty:
                  return '_No rows._'
              view = df.loc[:, [c for c in columns if c in df.columns]].head(limit).copy()
              headers = list(view.columns)
              lines = ['| ' + ' | '.join(headers) + ' |', '| ' + ' | '.join(['---'] * len(headers)) + ' |']
              for _, row in view.iterrows():
                  vals = []
                  for h in headers:
                      v = row[h]
                      vals.append(f'{v:.6g}' if isinstance(v, float) else str(v).replace('|', '/'))
                  lines.append('| ' + ' | '.join(vals) + ' |')
              return '\n'.join(lines)

          out_dir = Path('results/task2_8h_side_effect_reduction_methods_rc1')
          out_dir.mkdir(parents=True, exist_ok=True)

          table, errors, summary = build_and_validate_side_effect_reduction_methods_table()
          table.to_csv(out_dir / 'side_effect_reduction_methods.csv', index=False)

          positive = table[table['positive_side_effect_reduced_condition'].astype(bool)].sort_values('long_term_net_benefit', ascending=False)
          positive.to_csv(out_dir / 'positive_side_effect_reduced_conditions.csv', index=False)

          method_summary = table.groupby('method').agg(
              rows=('method', 'size'),
              positive_rows=('positive_side_effect_reduced_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_crash_delta=('crash_cost_delta_vs_no_op', 'mean'),
              mean_irreversibility_delta=('irreversibility_delta_vs_no_op', 'mean'),
              mean_gain_delta=('gain_auc_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
              mean_active_steps=('actual_active_steps', 'mean'),
          ).reset_index()
          method_summary.to_csv(out_dir / 'method_summary.csv', index=False)

          useful = table[(table['method'].astype(str) != 'no_op') & (table['crash_cost_delta_vs_no_op'] > 0.0)].copy()
          efficiency_summary = useful.groupby('method').agg(
              rows=('method', 'size'),
              mean_side_per_crash=('side_effect_per_crash_reduction', 'mean'),
              median_side_per_crash=('side_effect_per_crash_reduction', 'median'),
              mean_net_per_side=('net_per_side_effect', 'mean'),
              mean_net=('long_term_net_benefit', 'mean'),
          ).reset_index()
          efficiency_summary.to_csv(out_dir / 'efficiency_summary.csv', index=False)

          by_strength_duration = table[table['method'].astype(str) != 'no_op'].groupby(['method', 'strength_band', 'duration_band']).agg(
              rows=('method', 'size'),
              positive_rows=('positive_side_effect_reduced_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
              mean_crash_delta=('crash_cost_delta_vs_no_op', 'mean'),
              mean_side_per_crash=('side_effect_per_crash_reduction', lambda s: float(pd.Series(s)[pd.Series(s) < 900.0].mean()) if bool((pd.Series(s) < 900.0).any()) else 999.0),
          ).reset_index()
          by_strength_duration.to_csv(out_dir / 'strength_duration_summary.csv', index=False)

          by_dynamics = table.groupby(['risk_dynamics_type', 'method']).agg(
              rows=('method', 'size'),
              positive_rows=('positive_side_effect_reduced_condition', lambda s: int(pd.Series(s).astype(bool).sum())),
              mean_net=('long_term_net_benefit', 'mean'),
              mean_crash_delta=('crash_cost_delta_vs_no_op', 'mean'),
              mean_side_delta=('side_effect_delta_vs_no_op', 'mean'),
          ).reset_index()
          by_dynamics.to_csv(out_dir / 'dynamics_method_summary.csv', index=False)

          summary = dict(summary)
          summary['validation_errors'] = errors
          (out_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')

          md = []
          md.append('# Task 2-8h Side-Effect Reduction Methods RC1')
          md.append('')
          md.append('## Status')
          md.append('')
          if errors:
              md.append('Validation errors:')
              for err in errors:
                  md.append(f'- {err}')
          else:
              md.append('Side-effect reduction method sandbox completed with no validation errors.')
          md.append('')
          md.append('## Summary')
          md.append('')
          for key, value in summary.items():
              if key != 'by_method':
                  md.append(f'- `{key}`: `{value}`')
          md.append('')
          md.append('## Method summary')
          md.append('')
          md.append(markdown_table(method_summary, list(method_summary.columns), limit=20))
          md.append('')
          md.append('## Efficiency summary')
          md.append('')
          md.append(markdown_table(efficiency_summary, list(efficiency_summary.columns), limit=20))
          md.append('')
          md.append('## Top positive side-effect-reduced conditions')
          md.append('')
          md.append(markdown_table(
              positive,
              [
                  'risk_dynamics_type', 'risk_dynamics_ja', 'initial_risk_level', 'crash_threshold',
                  'method_ja', 'strength_band', 'duration_band', 'timing_band',
                  'long_term_net_benefit', 'crash_cost_delta_vs_no_op',
                  'irreversibility_delta_vs_no_op', 'side_effect_delta_vs_no_op',
                  'side_effect_per_crash_reduction', 'actual_active_steps', 'release_triggered',
                  'improvement_class',
              ],
              limit=50,
          ))
          (out_dir / 'TASK2_8H_SIDE_EFFECT_REDUCTION_METHODS_RC1.md').write_text('\n'.join(md), encoding='utf-8')

          print('\n'.join(md[:340]))
          if errors:
              raise SystemExit('Task2-8h validation errors')
          PY

      - name: Upload Task2-8h artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task2-8h-side-effect-reduction-methods-rc1
          path: results/task2_8h_side_effect_reduction_methods_rc1/
          if-no-files-found: error
